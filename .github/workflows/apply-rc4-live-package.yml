name: Apply RC4 live package patch

on:
  push:
    branches:
      - release/v0.1.0-rc.4
    paths:
      - validation/rc4_live_packages.patch
      - .github/workflows/apply-rc4-live-package.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release/v0.1.0-rc.4
          fetch-depth: 0

      - name: Apply verified live package patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check validation/rc4_live_packages.patch
          git apply validation/rc4_live_packages.patch
          rm validation/rc4_live_packages.patch
          rm .github/workflows/apply-rc4-live-package.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "RC4: geprüfte Live-Package-Dateien übernehmen"
          git push origin HEAD:release/v0.1.0-rc.4
