name: Debug RC4 tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  debug-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements-dev.txt
      - name: Run tests with JUnit output
        id: pytest
        continue-on-error: true
        run: pytest -x -vv -p no:cacheprovider --junitxml=pytest-junit.xml
      - name: Upload JUnit result
        uses: actions/upload-artifact@v4
        with:
          name: rc4-pytest-junit
          path: pytest-junit.xml
          if-no-files-found: error
      - name: Fail when pytest failed
        if: steps.pytest.outcome != 'success'
        run: exit 1
