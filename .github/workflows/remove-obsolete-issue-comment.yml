name: Remove obsolete issue comment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  cleanup:
    if: github.head_ref == 'maintenance/remove-obsolete-issue-comment-20260723'
    runs-on: ubuntu-latest
    steps:
      - name: Delete obsolete comment and cleanup branch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api --method DELETE "repos/${GH_REPO}/issues/comments/5058737526"
          gh api --method DELETE "repos/${GH_REPO}/git/refs/heads/maintenance/remove-obsolete-issue-comment-20260723"
