name: Cleanup temporary main-green branch

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  cleanup:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'fix/main-green-check'
    runs-on: ubuntu-latest
    steps:
      - name: Delete temporary branch
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: fix/main-green-check
        run: |
          set -euo pipefail
          gh api \
            --method DELETE \
            "repos/${GITHUB_REPOSITORY}/git/refs/heads/${BRANCH}"
          echo "Deleted temporary branch ${BRANCH}."
