name: Bootstrap final verified RC2 source

on:
  push:
    branches:
      - agent/prepare-v0.1.0-rc.2
  pull_request:
    types: [reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout bootstrap branch
        uses: actions/checkout@v4
        with:
          ref: agent/prepare-v0.1.0-rc.2
          fetch-depth: 0

      - name: Verify and unpack source archive
        shell: bash
        run: |
          set -euo pipefail
          echo "3c76dedd772ce1bde1957dadd8436ebdf5d7084ad096504899e4b47fd639d849  bootstrap/source.tar.xz" | sha256sum -c -
          rm -rf /tmp/final-source
          mkdir -p /tmp/final-source
          tar -xJf bootstrap/source.tar.xz -C /tmp/final-source
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/final-source/. .
          chmod +x scripts/*.sh scripts/validation/*.sh audit/*.sh validation/tools/*.sh validation/tools/*.py 2>/dev/null || true

      - name: Install validation dependencies
        run: python3 -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Read-only release gate
        run: python3 audit/readonly_audit.py . --release-gate

      - name: Python syntax
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for root in [Path('audit'), Path('scripts'), Path('tests'), Path('validation/tools')]:
              for path in root.rglob('*.py'):
                  compile(path.read_text(encoding='utf-8'), str(path), 'exec')
          PY

      - name: Shell syntax
        shell: bash
        run: find scripts audit validation/tools -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

      - name: Mode and writer contracts
        run: pytest -q -p no:cacheprovider

      - name: Build and verify release archive
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build_release.sh dist 0.1.0-rc.2
          ZIP="dist/SolarEdge_HA_Energy_Controller_v0.1.0-rc.2.zip"
          unzip -t "$ZIP"
          rm -rf /tmp/release-check
          mkdir -p /tmp/release-check
          unzip -q "$ZIP" -d /tmp/release-check
          python3 /tmp/release-check/SolarEdge_HA_Energy_Controller/audit/manifest_audit.py /tmp/release-check/SolarEdge_HA_Energy_Controller

      - name: Commit verified clean source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Vollständigen RC2-Quellstand mit MIT-Lizenz einspielen"
          git push