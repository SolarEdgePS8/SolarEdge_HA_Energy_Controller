name: Bootstrap final verified RC2 source

on:
  push:
    branches:
      - agent/prepare-v0.1.0-rc.2
  pull_request:
    types: [reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout bootstrap commit
        uses: actions/checkout@v4
        with:
          ref: agent/prepare-v0.1.0-rc.2
          fetch-depth: 0

      - name: Reconstruct verified source tree
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/base64/*.b64 | base64 --decode > /tmp/final-source.tar.xz
          echo "3c76dedd772ce1bde1957dadd8436ebdf5d7084ad096504899e4b47fd639d849  /tmp/final-source.tar.xz" | sha256sum -c -
          rm -rf /tmp/final-source
          mkdir -p /tmp/final-source
          tar -xJf /tmp/final-source.tar.xz -C /tmp/final-source

      - name: Validate complete source tree
        shell: bash
        working-directory: /tmp/final-source
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check -q -r requirements-dev.txt
          python3 audit/readonly_audit.py . --release-gate
          python3 - <<'PY'
          from pathlib import Path
          for root in [Path('audit'), Path('scripts'), Path('tests'), Path('validation/tools')]:
              if not root.exists():
                  continue
              for path in root.rglob('*.py'):
                  compile(path.read_text(encoding='utf-8'), str(path), 'exec')
          print('PYTHON_SYNTAX=PASS')
          PY
          find scripts audit validation/tools -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
          pytest -q -p no:cacheprovider
          rm -rf dist /tmp/release-check
          bash scripts/build_release.sh dist 0.1.0-rc.2
          unzip -t dist/SolarEdge_HA_Energy_Controller_v0.1.0-rc.2.zip
          mkdir -p /tmp/release-check
          unzip -q dist/SolarEdge_HA_Energy_Controller_v0.1.0-rc.2.zip -d /tmp/release-check
          python3 /tmp/release-check/SolarEdge_HA_Energy_Controller/audit/manifest_audit.py /tmp/release-check/SolarEdge_HA_Energy_Controller

      - name: Replace bootstrap with verified source
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          find /tmp/final-source -mindepth 1 -maxdepth 1 ! -name .github -exec cp -a {} . \;
          rm -rf dist .pytest_cache
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -name '*.pyc' -delete
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Vollständigen geprüften RC2-Quellstand einspielen"
          git push origin HEAD:agent/prepare-v0.1.0-rc.2
