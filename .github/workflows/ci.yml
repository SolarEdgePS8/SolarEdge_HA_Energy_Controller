name: Validate and publish RC4

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Read-only release gate and live parity
        run: python audit/readonly_audit.py . --release-gate

      - name: Python syntax
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for root in [Path("audit"), Path("scripts"), Path("tests"), Path("custom_components")]:
              for path in root.rglob("*.py"):
                  compile(path.read_text(encoding="utf-8"), str(path), "exec")
          PY

      - name: Shell syntax
        shell: bash
        run: find scripts audit tools -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

      - name: Mode, writer, watchdog and live-parity contracts
        run: pytest -q -p no:cacheprovider

      - name: Installer portability, manifest, watchdog and rollback simulation
        shell: bash
        run: |
          set -euo pipefail
          TMP="$(mktemp -d)"
          CONFIG="$TMP/config"
          SHARE="$TMP/share"
          mkdir -p "$CONFIG/packages" "$SHARE"
          cat > "$CONFIG/configuration.yaml" <<'YAML'
          homeassistant:
            packages: !include_dir_named packages
          YAML
          cp "$CONFIG/configuration.yaml" "$TMP/configuration.original.yaml"

          CONFIG_ROOT="$CONFIG" \
          SHARE_ROOT="$SHARE" \
          SE_CONTROLLER_DRY_RUN=1 \
          HA_CHECK_COMMAND=true \
            bash scripts/install_package.sh

          python - "$CONFIG" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          config = Path(sys.argv[1])
          manifest = json.loads(
              (config / ".se_controller_runtime_manifest.json").read_text(encoding="utf-8")
          )
          assert manifest["project"] == "SolarEdge_HA_Energy_Controller"
          assert manifest["version"] == "0.1.0-rc.4"
          assert len(manifest["installed_files"]) == 28, manifest
          for rel, expected in manifest["installed_files"].items():
              path = config / rel
              assert path.is_file(), rel
              assert hashlib.sha256(path.read_bytes()).hexdigest() == expected, rel

          configuration = (config / "configuration.yaml").read_text(encoding="utf-8")
          assert configuration.count("\nse_write_watchdog:\n") == 1, configuration
          assert (config / "custom_components/se_write_watchdog/__init__.py").is_file()
          assert (config / "custom_components/se_write_watchdog/manifest.json").is_file()
          assert (config / "custom_components/se_write_watchdog/services.yaml").is_file()
          assert (config / "se_write_watchdog_tools/report.sh").is_file()
          assert (config / "se_write_watchdog_tools/watch.sh").is_file()
          print({"installed_files": 28, "hashes": "PASS", "watchdog": "PASS"})
          PY

          # Bestehende Installation ohne Token muss vor Änderungen sicher abbrechen.
          set +e
          CONFIG_ROOT="$CONFIG" \
          SHARE_ROOT="$SHARE" \
          HA_CHECK_COMMAND=true \
            bash scripts/install_package.sh
          gate_rc=$?
          set -e
          test "$gate_rc" -ne 0

          # Regulärer manueller Rollback der ersten Installation.
          CONFIG_ROOT="$CONFIG" \
          SHARE_ROOT="$SHARE" \
          SE_CONTROLLER_DRY_RUN=1 \
          HA_CHECK_COMMAND=true \
            bash scripts/rollback.sh
          test -z "$(find "$CONFIG/packages" -maxdepth 1 -name 'se_controller_*.yaml' -print -quit)"
          test ! -f "$CONFIG/.se_controller_runtime_manifest.json"
          test ! -f "$CONFIG/custom_components/se_write_watchdog/__init__.py"
          test ! -f "$CONFIG/se_write_watchdog_tools/report.sh"
          cmp "$CONFIG/configuration.yaml" "$TMP/configuration.original.yaml"

          # Fehler in der HA-Prüfung muss automatisch vollständig zurückrollen.
          CONFIG2="$TMP/config_failure"
          SHARE2="$TMP/share_failure"
          mkdir -p "$CONFIG2/packages" "$SHARE2"
          cat > "$CONFIG2/configuration.yaml" <<'YAML'
          homeassistant:
            packages: !include_dir_named packages
          YAML
          cp "$CONFIG2/configuration.yaml" "$TMP/configuration2.original.yaml"
          set +e
          CONFIG_ROOT="$CONFIG2" \
          SHARE_ROOT="$SHARE2" \
          SE_CONTROLLER_DRY_RUN=1 \
          HA_CHECK_COMMAND=false \
            bash scripts/install_package.sh
          failure_rc=$?
          set -e
          test "$failure_rc" -ne 0
          test -z "$(find "$CONFIG2/packages" -maxdepth 1 -name 'se_controller_*.yaml' -print -quit)"
          test ! -f "$CONFIG2/.se_controller_runtime_manifest.json"
          test ! -f "$CONFIG2/custom_components/se_write_watchdog/__init__.py"
          test ! -f "$CONFIG2/se_write_watchdog_tools/report.sh"
          cmp "$CONFIG2/configuration.yaml" "$TMP/configuration2.original.yaml"

      - name: Build release archive
        run: bash scripts/build_release.sh dist 0.1.0-rc.4

      - name: Verify release ZIP and manifest
        shell: bash
        run: |
          set -euo pipefail
          ZIP="dist/SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip"
          SHA="dist/SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip.sha256"
          test -f "$ZIP"
          test -f "$SHA"
          (cd dist && sha256sum -c "$(basename "$SHA")")
          unzip -t "$ZIP"
          mkdir extracted
          unzip -q "$ZIP" -d extracted
          python extracted/SolarEdge_HA_Energy_Controller/audit/manifest_audit.py \
            extracted/SolarEdge_HA_Energy_Controller
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("extracted/SolarEdge_HA_Energy_Controller")
          manifest = json.loads(
              (root / "validation/release_manifest.json").read_text(encoding="utf-8")
          )
          assert manifest["project"] == "SolarEdge_HA_Energy_Controller"
          assert manifest["version"] == "0.1.0-rc.4"
          assert manifest.get("source_commit"), manifest
          assert (root / "scripts/lib/ha_environment.sh").is_file()
          assert (root / "docs/09_INSTALLATION_VARIANTS.md").is_file()
          assert (root / "docs/10_WRITE_WATCHDOG.md").is_file()
          assert (root / "custom_components/se_write_watchdog/__init__.py").is_file()
          assert (root / "validation/live_package_sha256_rc4.json").is_file()
          print({
              "version": manifest["version"],
              "source_commit": manifest["source_commit"],
              "files": len(manifest["files"]),
              "portable_installer": True,
              "watchdog": True,
              "live_parity": True,
              "pass": True,
          })
          PY

      - name: Upload tested release bundle
        uses: actions/upload-artifact@v4
        with:
          name: SolarEdge_HA_Energy_Controller_v0.1.0-rc.4
          path: |
            dist/SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip
            dist/SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip.sha256
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish v0.1.0-rc.4 prerelease
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download tested release bundle
        uses: actions/download-artifact@v4
        with:
          name: SolarEdge_HA_Energy_Controller_v0.1.0-rc.4
          path: release

      - name: Publish GitHub prerelease once
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: v0.1.0-rc.4
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG existiert bereits; keine erneute Veröffentlichung."
            exit 0
          fi

          cat > release-notes.md <<'NOTES'
          ## SolarEdge HA Energy Controller v0.1.0-rc.4

          RC4 verhindert unnötige `0 → 5000 → 0`-Schreibzyklen beim Home-Assistant-/EVOpt-Startup und veröffentlicht den auf der Referenzinstallation getesteten Write-Watchdog.

          ### Wesentliche Änderungen

          - EVOpt-Startup-Handover hält den zuletzt bestätigten SolarEdge-Zustand;
          - vollständiger Legacy-Fallback erst nach 20 Minuten durchgehendem EVOpt-Ausfall;
          - `holdcharge` wirkt sofort und bleibt 180 Sekunden gelatcht;
          - Freigabe auf 5000 W erst nach 90 Sekunden stabilem finalem Sollwert;
          - nur der zentrale Charge-Limit-Writer schreibt;
          - Master, Site-Bestätigung, EVOpt-Aktivierung und EVOpt-URL bleiben über Neustarts erhalten;
          - Watchdog 1.0.2 protokolliert Service-Aufrufe, Context-Kette, Write-Intent, Zustandswechsel, Roundtrips und unerwartete Schreiber;
          - alle 18 veröffentlichten Package-YAMLs sind per SHA256 byteidentisch mit dem geprüften Live-Export.

          ### Installation / Update

          1. ZIP und `.sha256` aus den Release-Assets in einen lokalen Arbeitsordner kopieren.
          2. Prüfsumme mit `sha256sum -c` kontrollieren.
          3. ZIP in einen leeren Ordner entpacken.
          4. Für eine neue Installation `bash scripts/install_package.sh` ausführen.
          5. Für ein Update `bash scripts/update_package.sh` ausführen.
          6. Home Assistant neu starten, Site-Konfiguration anwenden und `bash scripts/run_first_checks.sh` ausführen.
          7. Den Controller-Master erst nach `PASS=True` einschalten.

          Der Installer installiert den Watchdog automatisch und sichert beziehungsweise entfernt ihn beim Rollback zusammen mit den Controller-Dateien.

          Vollständige Anleitungen: `docs/02_FIRST_INSTALL.md`, `docs/05_UPDATE.md`, `docs/10_WRITE_WATCHDOG.md`.

          Dieses Release ist weiterhin ein Prerelease und noch kein stabiler v1.0-Stand.
          NOTES

          gh release create "$TAG" \
            release/SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip \
            release/SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip.sha256 \
            --target "$GITHUB_SHA" \
            --title "SolarEdge HA Energy Controller v0.1.0-rc.4" \
            --notes-file release-notes.md \
            --prerelease
