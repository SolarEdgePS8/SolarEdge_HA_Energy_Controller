name: Publish RC4 from verified release PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'release/v0.1.0-rc.4-publish'
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout release head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Validate source
        shell: bash
        run: |
          set -euo pipefail
          python3 audit/readonly_audit.py . --release-gate
          pytest -q -p no:cacheprovider
          find scripts audit tools -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

      - name: Build and verify release
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build_release.sh dist 0.1.0-rc.4
          cd dist
          sha256sum -c SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip.sha256
          unzip -t SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip

      - name: Publish prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.event.pull_request.head.sha }}
          TAG: v0.1.0-rc.4
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG existiert bereits."
            exit 0
          fi

          cat > release-notes.md <<'NOTES'
          ## SolarEdge HA Energy Controller v0.1.0-rc.4

          RC4 verhindert unnötige `0 → 5000 → 0`-Schreibzyklen beim Home-Assistant-/EVOpt-Startup und veröffentlicht den auf der Referenzinstallation geprüften Write-Watchdog.

          ### Änderungen

          - EVOpt-Startup-Handover hält bei kurzen Ausfällen den zuletzt bestätigten SolarEdge-Zustand;
          - vollständiger Legacy-Fallback erst nach 20 Minuten durchgehendem EVOpt-Ausfall;
          - `holdcharge` wirkt sofort und bleibt 180 Sekunden gelatcht;
          - Freigabe auf `5000 W` erst nach 90 Sekunden stabilem finalem Sollwert;
          - genau ein Charge-Limit-Writer mit Audit-Intent;
          - Watchdog `1.0.2` für Service-Aufrufe, Context-Kette, Zustandswechsel, Roundtrips und unerwartete Schreiber;
          - alle 18 Package-YAMLs per SHA256 byteidentisch mit dem geprüften Live-Export vom 22.07.2026;
          - portabler Installer, Update, Rollback und Runtime-Manifest mit 28 verwalteten Dateien;
          - vollständige Installations-, Update-, Watchdog- und Troubleshooting-Dokumentation.

          ### Installation

          1. ZIP und `.sha256` herunterladen.
          2. `sha256sum -c SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip.sha256` ausführen.
          3. ZIP in einen leeren Ordner entpacken.
          4. Neue Installation: `bash scripts/install_package.sh`.
          5. Bestehende Installation: `bash scripts/update_package.sh`.
          6. Home Assistant neu starten, Site-Konfiguration anwenden und `bash scripts/run_first_checks.sh` ausführen.
          7. Master erst nach `PASS=True` einschalten.

          Dieses Release ist weiterhin ein Prerelease und noch kein stabiler `v1.0`-Stand.
          NOTES

          gh release create "$TAG" \
            dist/SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip \
            dist/SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip.sha256 \
            --target "$TARGET_SHA" \
            --title "SolarEdge HA Energy Controller v0.1.0-rc.4" \
            --notes-file release-notes.md \
            --prerelease
