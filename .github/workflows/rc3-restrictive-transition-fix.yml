name: Apply RC3 restrictive transition fix

on:
  push:
    branches:
      - fix/rc3-release-hardening
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/rc3-release-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Apply fix
        run: python scripts/dev/apply_rc3_restrictive_transition_fix.py
      - name: Validate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import yaml
          for path in Path('package').glob('*.yaml'):
              yaml.safe_load(path.read_text(encoding='utf-8'))
          print('YAML=PASS')
          PY
          pytest -q -p no:cacheprovider
          python audit/readonly_audit.py . --release-gate
      - name: Commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package/se_controller_50_mode_evopt.yaml package/se_controller_80_charge_writer.yaml
          git commit -m "RC3: restriktive EVOpt-Übergänge sofort absichern"
          git push origin HEAD:fix/rc3-release-hardening
