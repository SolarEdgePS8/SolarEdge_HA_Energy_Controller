name: Audit and mark RC4 release

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  audit-release:
    if: github.head_ref == 'maintenance/audit-and-mark-rc4-release-20260723'
    runs-on: ubuntu-latest
    steps:
      - name: Audit historical prereleases and mark RC4 as superseded
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo '## Release-Audit' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"

          for tag in v0.1.0-rc.2 v0.1.0-rc.3 v0.1.0-rc.4; do
            if release_json="$(gh api "repos/${GH_REPO}/releases/tags/${tag}" 2>/dev/null)"; then
              name="$(jq -r '.name' <<<"$release_json")"
              prerelease="$(jq -r '.prerelease' <<<"$release_json")"
              draft="$(jq -r '.draft' <<<"$release_json")"
              assets="$(jq -r '[.assets[].name] | join(", ")' <<<"$release_json")"
              echo "- ${tag}: vorhanden; Name='${name}'; prerelease=${prerelease}; draft=${draft}; Assets=${assets:-keine}" | tee -a "$GITHUB_STEP_SUMMARY"
            else
              echo "- ${tag}: kein GitHub-Release vorhanden" | tee -a "$GITHUB_STEP_SUMMARY"
            fi
          done

          release_json="$(gh api "repos/${GH_REPO}/releases/tags/v0.1.0-rc.4")"
          release_id="$(jq -r '.id' <<<"$release_json")"

          asset_names="$(jq -r '.assets[].name' <<<"$release_json")"
          grep -Fxq 'SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip' <<<"$asset_names"
          grep -Fxq 'SolarEdge_HA_Energy_Controller_v0.1.0-rc.4.zip.sha256' <<<"$asset_names"

          body_file="$(mktemp)"
          cat > "$body_file" <<'EOF'
# Veraltet – nicht mehr installieren

Dieses Prerelease bleibt ausschließlich zur historischen Nachvollziehbarkeit erhalten.

Der Tag `v0.1.0-rc.4` enthält noch **nicht**:

- den finalen EVOpt-Hard-Block aus PR #39;
- den Schutz gegen `5000 W` bei gleichzeitigem `raw=holdcharge`, `stable=holdcharge` oder `charge_block=on`;
- den Runtime-Checker-Fix aus PR #41.

Der reale Anlagenfehler wurde erst nach Veröffentlichung dieses Tags vollständig reproduziert und korrigiert. Die vorhandenen ZIP-/SHA256-Assets sind daher zwar dem damaligen Tag zugeordnet, dürfen aber nicht mehr als aktueller Installationsstand verwendet werden.

Aktueller Status und Realtest: Issue #31.

Ein neues Prerelease wird erst nach bestandener Langzeitabnahme auf der realen Referenzanlage veröffentlicht.
EOF

          gh api --method PATCH "repos/${GH_REPO}/releases/${release_id}" \
            -f name='v0.1.0-rc.4 – VERALTET, NICHT INSTALLIEREN' \
            -f body="$(cat "$body_file")" \
            -F prerelease=true \
            -F draft=false \
            -f make_latest=false >/dev/null

          updated="$(gh api "repos/${GH_REPO}/releases/tags/v0.1.0-rc.4")"
          test "$(jq -r '.prerelease' <<<"$updated")" = true
          test "$(jq -r '.draft' <<<"$updated")" = false
          test "$(jq -r '.name' <<<"$updated")" = 'v0.1.0-rc.4 – VERALTET, NICHT INSTALLIEREN'

          echo >> "$GITHUB_STEP_SUMMARY"
          echo '✅ RC4 ist als veraltetes historisches Prerelease markiert.' >> "$GITHUB_STEP_SUMMARY"
          echo '✅ ZIP und SHA256-Asset sind vorhanden.' >> "$GITHUB_STEP_SUMMARY"
          echo '✅ Tag und Release-Historie wurden nicht umgeschrieben.' >> "$GITHUB_STEP_SUMMARY"

          gh api --method DELETE \
            "repos/${GH_REPO}/git/refs/heads/maintenance/audit-and-mark-rc4-release-20260723"
