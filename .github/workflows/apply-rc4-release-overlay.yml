name: Apply RC4 release overlay

on:
  push:
    branches:
      - release/v0.1.0-rc.4
    paths:
      - validation/rc4_release_overlay.part.*
      - .github/workflows/apply-rc4-release-overlay.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release/v0.1.0-rc.4
          fetch-depth: 0

      - name: Extract verified RC4 release overlay
        shell: bash
        run: |
          set -euo pipefail
          cat validation/rc4_release_overlay.part.* > /tmp/rc4_release_overlay.b64
          base64 -d /tmp/rc4_release_overlay.b64 > /tmp/rc4_release_overlay.tar.gz
          tar -xzf /tmp/rc4_release_overlay.tar.gz -C .
          rm validation/rc4_release_overlay.part.*
          rm .github/workflows/apply-rc4-release-overlay.yml
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete

          python3 -m py_compile audit/readonly_audit.py
          python3 -m py_compile custom_components/se_write_watchdog/__init__.py
          bash -n scripts/install_package.sh
          bash -n scripts/build_release.sh
          bash -n tools/se_write_watchdog/report.sh
          bash -n tools/se_write_watchdog/watch.sh

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "RC4: Release, Installer, Tests und Dokumentation vervollständigen"
          git push origin HEAD:release/v0.1.0-rc.4
