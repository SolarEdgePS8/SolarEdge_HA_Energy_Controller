name: Apply sensor docs scripts and squash once

on:
  push:
    branches:
      - docs/sensor-sources-portable-mapping

permissions:
  contents: write

jobs:
  apply-and-squash:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout documentation branch
        uses: actions/checkout@v6
        with:
          ref: docs/sensor-sources-portable-mapping
          fetch-depth: 0

      - name: Restore reviewed scripts
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/se_scripts_only.b64 <<'B64'

B64
          base64 -d /tmp/se_scripts_only.b64 > /tmp/se_scripts_only.zip
          unzip -o /tmp/se_scripts_only.zip -d .
          chmod +x scripts/discover_entities.py scripts/install_package.sh

      - name: Validate documentation and scripts
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/discover_entities.py
          bash -n scripts/install_package.sh
          python3 -m pip install --disable-pip-version-check -r requirements-dev.txt
          pytest -q -p no:cacheprovider tests/test_discover_entities.py
          python3 - <<'PY'
          from pathlib import Path
          import yaml
          for path in sorted(Path('examples/sensors').glob('*.yaml')):
              yaml.safe_load(path.read_text(encoding='utf-8'))
              print('YAML OK', path)
          PY
          python3 audit/readonly_audit.py . --release-gate

      - name: Squash branch into one reviewed commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git reset --soft 89549d97959533baf8c4f208184e53e0cddbcbb7
          rm -f .github/workflows/apply-sensor-docs-scripts-and-squash.yml
          git add -A
          git commit -m "Docs: Sensorquellen, Mapping-Assistent und portable Installation"
          git push --force-with-lease origin HEAD:docs/sensor-sources-portable-mapping
