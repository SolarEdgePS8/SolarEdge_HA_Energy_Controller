name: Bootstrap verified RC2 source

on:
  push:
    branches:
      - agent/prepare-v0.1.0-rc.2

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct verified source tree
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/1afea928f5c410342baad1f97bd9a223ad72e0fd" --jq .content \
            | tr -d '\n' \
            | base64 --decode > /tmp/source.tar.xz
          echo "3c76dedd772ce1bde1957dadd8436ebdf5d7084ad096504899e4b47fd639d849  /tmp/source.tar.xz" | sha256sum -c -
          rm -rf /tmp/source
          mkdir -p /tmp/source
          tar -xJf /tmp/source.tar.xz -C /tmp/source
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/source/. .
          chmod +x scripts/*.sh scripts/validation/*.sh audit/*.sh validation/tools/*.sh validation/tools/*.py 2>/dev/null || true

      - name: Install validation dependencies
        run: python3 -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Read-only release gate
        run: python3 audit/readonly_audit.py . --release-gate

      - name: Python syntax
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for root in [Path('audit'), Path('scripts'), Path('tests'), Path('validation/tools')]:
              for path in root.rglob('*.py'):
                  compile(path.read_text(encoding='utf-8'), str(path), 'exec')
          PY

      - name: Shell syntax
        shell: bash
        run: find scripts audit validation/tools -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

      - name: Mode and writer contracts
        run: pytest -q -p no:cacheprovider

      - name: Release build
        shell: bash
        run: |
          bash scripts/build_release.sh dist 0.1.0-rc.2
          unzip -t dist/SolarEdge_HA_Energy_Controller_v0.1.0-rc.2.zip

      - name: Commit verified source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Vollständigen RC2-Quellstand einspielen"
          git push