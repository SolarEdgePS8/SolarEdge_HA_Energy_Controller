name: Cleanup temporary About branch

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  cleanup:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'maintenance/set-repository-about'
    runs-on: ubuntu-latest
    steps:
      - name: Delete temporary branch
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: maintenance/set-repository-about
        run: |
          set -euo pipefail
          gh api \
            --method DELETE \
            "repos/${GITHUB_REPOSITORY}/git/refs/heads/${BRANCH}"
          echo "Deleted temporary branch ${BRANCH}."
