name: Apply CI backup and Node24 fix once

on:
  push:
    branches:
      - fix/ci-backup-collision-node24

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v6
        with:
          ref: fix/ci-backup-collision-node24

      - name: Apply deterministic fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          install = Path('scripts/install_package.sh')
          text = install.read_text(encoding='utf-8')

          old = '''STAMP="$(date -u '+%Y%m%dT%H%M%SZ')"
          BACKUP="$SHARE/se_controller_backup_$STAMP"
          ACTIONS="$BACKUP/backup_actions.tsv"
          '''
          new = '''STAMP="${SE_CONTROLLER_BACKUP_STAMP:-$(date -u '+%Y%m%dT%H%M%SZ')}"
          mkdir -p "$SHARE"
          BACKUP="$(mktemp -d "${SHARE%/}/se_controller_backup_${STAMP}_XXXXXX")"
          ACTIONS="$BACKUP/backup_actions.tsv"
          '''
          if old not in text:
              raise SystemExit('Erwarteter Backup-Block in install_package.sh nicht gefunden')
          text = text.replace(old, new, 1)
          text = text.replace(
              'mkdir -p "$BACKUP/content" "$CONFIG/packages" "$SHARE"',
              'mkdir -p "$BACKUP/content" "$CONFIG/packages"',
              1,
          )
          install.write_text(text, encoding='utf-8')

          ci = Path('.github/workflows/ci.yml')
          text = ci.read_text(encoding='utf-8')
          text = text.replace('actions/checkout@v4', 'actions/checkout@v6')
          text = text.replace('actions/setup-python@v5', 'actions/setup-python@v6')
          text = text.replace('actions/upload-artifact@v4', 'actions/upload-artifact@v6')

          replacements = [
              (
                  'CONFIG_ROOT="$CONFIG" \\\n          SHARE_ROOT="$SHARE" \\\n          SE_CONTROLLER_DRY_RUN=1 \\\n          HA_CHECK_COMMAND=true \\\n            bash scripts/install_package.sh',
                  'CONFIG_ROOT="$CONFIG" \\\n          SHARE_ROOT="$SHARE" \\\n          SE_CONTROLLER_BACKUP_STAMP=ci-fixed-stamp \\\n          SE_CONTROLLER_DRY_RUN=1 \\\n          HA_CHECK_COMMAND=true \\\n            bash scripts/install_package.sh',
              ),
              (
                  'CONFIG_ROOT="$CONFIG" \\\n          SHARE_ROOT="$SHARE" \\\n          HA_CHECK_COMMAND=true \\\n            bash scripts/install_package.sh',
                  'CONFIG_ROOT="$CONFIG" \\\n          SHARE_ROOT="$SHARE" \\\n          SE_CONTROLLER_BACKUP_STAMP=ci-fixed-stamp \\\n          HA_CHECK_COMMAND=true \\\n            bash scripts/install_package.sh',
              ),
              (
                  'CONFIG_ROOT="$CONFIG2" \\\n          SHARE_ROOT="$SHARE2" \\\n          SE_CONTROLLER_DRY_RUN=1 \\\n          HA_CHECK_COMMAND=false \\\n            bash scripts/install_package.sh',
                  'CONFIG_ROOT="$CONFIG2" \\\n          SHARE_ROOT="$SHARE2" \\\n          SE_CONTROLLER_BACKUP_STAMP=ci-fixed-stamp \\\n          SE_CONTROLLER_DRY_RUN=1 \\\n          HA_CHECK_COMMAND=false \\\n            bash scripts/install_package.sh',
              ),
          ]
          for old_block, new_block in replacements:
              if old_block not in text:
                  raise SystemExit('Erwarteter Installer-Aufruf in ci.yml nicht gefunden')
              text = text.replace(old_block, new_block, 1)

          ci.write_text(text, encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          marker = '# Changelog\n\n'
          addition = '''# Changelog

## Unreleased

- Installer-Backups werden mit einem eindeutigen `mktemp`-Suffix erzeugt; mehrere Installations- oder Rollbacktests innerhalb derselben Sekunde können sich nicht mehr gegenseitig überschreiben;
- CI erzwingt denselben Zeitstempel für mehrere Installationsläufe und prüft die Kollisionssicherheit deterministisch;
- GitHub Actions auf Node-24-fähige Versionen aktualisiert: `checkout@v6`, `setup-python@v6` und `upload-artifact@v6`;
- keine Änderungen an den 18 produktiven Package-YAMLs oder an der Controller-Laufzeitlogik.

'''
          if not text.startswith(marker):
              raise SystemExit('Unerwarteter Changelog-Kopf')
          changelog.write_text(addition + text[len(marker):], encoding='utf-8')
          PY

          bash -n scripts/install_package.sh
          python3 - <<'PY'
          from pathlib import Path
          install = Path('scripts/install_package.sh').read_text(encoding='utf-8')
          ci = Path('.github/workflows/ci.yml').read_text(encoding='utf-8')
          assert 'mktemp -d' in install
          assert 'SE_CONTROLLER_BACKUP_STAMP' in install
          assert 'actions/checkout@v6' in ci
          assert 'actions/setup-python@v6' in ci
          assert 'actions/upload-artifact@v6' in ci
          assert ci.count('SE_CONTROLLER_BACKUP_STAMP=ci-fixed-stamp') == 3
          PY

      - name: Commit fixes and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-ci-backup-node24-fix-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/install_package.sh .github/workflows/ci.yml CHANGELOG.md .github/workflows/apply-ci-backup-node24-fix-once.yml
          git commit -m "CI: Backup-Kollision beheben und Node 24 verwenden"
          git push origin HEAD:fix/ci-backup-collision-node24
