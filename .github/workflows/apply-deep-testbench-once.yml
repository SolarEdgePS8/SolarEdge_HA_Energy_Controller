name: Apply deep testbench once

on:
  push:
    branches:
      - test/deep-codespaces-testbench
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'push' || github.head_ref == 'test/deep-codespaces-testbench')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout testbench branch
        uses: actions/checkout@v6
        with:
          ref: test/deep-codespaces-testbench

      - name: Decode, verify and apply testbench payload
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import hashlib

          parts = sorted(Path('.deep-testbench-payload').glob('chunk_*.b64'))
          if not parts:
              raise SystemExit('Keine Payload-Teile gefunden')
          encoded = b''.join(part.read_bytes() for part in parts)
          archive = base64.b64decode(encoded)
          digest = hashlib.sha256(archive).hexdigest()
          expected = 'e64be97e5f3742fd2a4a73120bddf6686617506e5a492c39e05ea65999db6765'
          print(f'Payload-SHA256: {digest}')
          if digest != expected:
              raise SystemExit(f'Payload-SHA256 falsch: {digest} != {expected}')
          Path('/tmp/deep-testbench.zip').write_bytes(archive)
          PY
          unzip -t /tmp/deep-testbench.zip
          unzip -oq /tmp/deep-testbench.zip -d .

          # GitHub Actions darf mit seinem Laufzeittoken keine neue Workflow-Datei pushen.
          # Der dauerhafte Deep-Workflow wird nach diesem Commit separat über die
          # GitHub-App mit Workflow-Berechtigung angelegt.
          rm -f .github/workflows/deep-testbench.yml
          rm -rf .deep-testbench-payload
          rm -f .github/workflows/apply-deep-testbench-once.yml
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete

      - name: Commit complete testbench without workflow file
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Test: Codespaces und mehrstufigen Deep Testbench ergänzen"

          set +e
          git push origin HEAD:test/deep-codespaces-testbench \
            > /tmp/push.log 2>&1
          push_rc=$?
          set -e
          cat /tmp/push.log
          if [ "$push_rc" -ne 0 ]; then
            {
              echo '## Automatischer Payload-Push fehlgeschlagen'
              echo
              echo '```text'
              cat /tmp/push.log
              echo '```'
            } > /tmp/issue-comment.md
            gh issue comment 22 --body-file /tmp/issue-comment.md
            exit "$push_rc"
          fi
