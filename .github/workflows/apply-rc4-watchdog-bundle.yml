name: Apply RC4 watchdog bundle

on:
  push:
    branches:
      - release/v0.1.0-rc.4
    paths:
      - validation/rc4_watchdog_bundle.tar.gz.b64
      - .github/workflows/apply-rc4-watchdog-bundle.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release/v0.1.0-rc.4
          fetch-depth: 0

      - name: Extract verified watchdog bundle
        shell: bash
        run: |
          set -euo pipefail
          base64 -d validation/rc4_watchdog_bundle.tar.gz.b64 > /tmp/rc4_watchdog_bundle.tar.gz
          tar -xzf /tmp/rc4_watchdog_bundle.tar.gz -C .
          rm validation/rc4_watchdog_bundle.tar.gz.b64
          rm .github/workflows/apply-rc4-watchdog-bundle.yml
          find custom_components tools -type d -name __pycache__ -prune -exec rm -rf {} + || true
          find custom_components tools -type f -name '*.pyc' -delete || true
          python3 -m py_compile custom_components/se_write_watchdog/__init__.py
          find custom_components -type d -name __pycache__ -prune -exec rm -rf {} +

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "RC4: Write-Watchdog 1.0.2 und Terminal-Werkzeuge integrieren"
          git push origin HEAD:release/v0.1.0-rc.4
