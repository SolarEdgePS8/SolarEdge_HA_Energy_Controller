name: Fehlerbericht
description: Reproduzierbaren Fehler melden
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Bitte keine secrets.yaml, Datenbanken, privaten URLs oder vollständigen Backups hochladen.
  - type: input
    id: version
    attributes:
      label: Controller-Version
      placeholder: v0.1.0-rc.2
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Betriebsart
      options:
        - Eigenverbrauch maximieren
        - Netzdienlich laden
        - Akku schonen
        - EVOpt optimiert
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Fehler und erwartetes Verhalten
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Bereinigte Diagnose
      description: Config Check, Sanity Check, Start-Gate, Writer-Entscheidung und relevante Mappings ohne private Daten.
