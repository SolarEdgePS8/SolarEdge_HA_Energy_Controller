services:
  fake-evcc:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fake_evcc
    ports:
      - "7070:7070"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7070/healthz', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10

  home-assistant:
    image: ${HA_IMAGE:-ghcr.io/home-assistant/home-assistant:2026.7.3}
    ports:
      - "8123:8123"
    volumes:
      - ${SE_TEST_CONFIG:-../.testbench/config}:/config
    depends_on:
      fake-evcc:
        condition: service_healthy
