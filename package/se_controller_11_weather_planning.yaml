# SolarEdge Energy Controller v0.0.1 · Wetterplanung
# Keine Modusentscheidung und keine SolarEdge-Writes.

template:
  - trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        minutes: "/30"
      - platform: state
        entity_id:
          - input_text.se_nf_weather_entity
          - input_boolean.se_nf_weather_planning_enabled
    action:
      - variables:
          w_entity: >-
            {% set cfg = states('input_text.se_nf_weather_entity') | trim %}
            {% if cfg %}
              {{ cfg }}
            {% else %}
              {% set ws = states.weather | list %}
              {% if ws | count > 0 %}
                {{ ws[0].entity_id }}
              {% else %}
                unknown
              {% endif %}
            {% endif %}
      - if:
          - condition: template
            value_template: "{{ w_entity not in ['unknown','unavailable','none',''] and w_entity.startswith('weather.') }}"
        then:
          - service: weather.get_forecasts
            target:
              entity_id: "{{ w_entity }}"
            data:
              type: hourly
            response_variable: se_nf_weather_hourly
        else:
          - variables:
              se_nf_weather_hourly: {}
    sensor:
      - name: "SE NF Weather Factor Today Morning"
        unique_id: se_nf_weather_factor_today_morning
        icon: mdi:weather-sunset-up
        state: >-
          {% if is_state('input_boolean.se_nf_weather_planning_enabled','off') %}
            1.00
          {% else %}
            {% set ent = w_entity | trim %}
            {% set fc = se_nf_weather_hourly.get(ent, {}).get('forecast', []) if se_nf_weather_hourly is defined else [] %}
            {% set target_day = now().strftime('%Y-%m-%d') %}
            {% set ns = namespace(sum=0, cnt=0) %}

            {% for item in fc %}
              {% set ts = as_timestamp(item.datetime | default('', true), 0) | int(0) %}
              {% if ts > 0 %}
                {% set d = ts | timestamp_custom('%Y-%m-%d', true) %}
                {% set h = ts | timestamp_custom('%H', true) | int(0) %}

                {% if d == target_day and h >= 6 and h <= 10 %}
                  {% set cond = item.condition | default('', true) | lower %}

                  {% if item.cloud_coverage is defined and item.cloud_coverage is not none %}
                    {% set cloud = item.cloud_coverage | float(0) %}
                    {% if cloud <= 20 %}
                      {% set cf = 1.00 %}
                    {% elif cloud <= 50 %}
                      {% set cf = 0.92 %}
                    {% elif cloud <= 75 %}
                      {% set cf = 0.82 %}
                    {% else %}
                      {% set cf = 0.68 %}
                    {% endif %}
                  {% else %}
                    {% if cond in ['sunny', 'clear-night'] or 'sonnig' in cond or 'klar' in cond %}
                      {% set cf = 1.00 %}
                    {% elif cond in ['partlycloudy', 'partly-cloudy'] or 'partly' in cond or 'heiter' in cond or 'leicht' in cond %}
                      {% set cf = 0.90 %}
                    {% elif cond in ['cloudy'] or 'cloud' in cond or 'bewölkt' in cond or 'bedeckt' in cond or 'overcast' in cond %}
                      {% set cf = 0.75 %}
                    {% elif cond in ['fog'] or 'fog' in cond or 'nebel' in cond %}
                      {% set cf = 0.70 %}
                    {% elif cond in ['rainy', 'pouring'] or 'rain' in cond or 'regen' in cond or 'schauer' in cond %}
                      {% set cf = 0.62 %}
                    {% elif cond in ['lightning', 'lightning-rainy'] or 'thunder' in cond or 'gewitter' in cond %}
                      {% set cf = 0.55 %}
                    {% elif cond in ['snowy', 'snowy-rainy'] or 'snow' in cond or 'schnee' in cond %}
                      {% set cf = 0.60 %}
                    {% else %}
                      {% set cf = states('input_number.se_nf_weather_missing_forecast_factor') | float(0.85) %}
                    {% endif %}
                  {% endif %}

                  {% if item.precipitation_probability is defined and item.precipitation_probability is not none %}
                    {% set p = item.precipitation_probability | float(0) %}
                    {% if p < 20 %}
                      {% set rf = 1.00 %}
                    {% elif p < 40 %}
                      {% set rf = 0.94 %}
                    {% elif p < 60 %}
                      {% set rf = 0.84 %}
                    {% elif p < 80 %}
                      {% set rf = 0.74 %}
                    {% else %}
                      {% set rf = 0.64 %}
                    {% endif %}
                  {% else %}
                    {% set precip = item.precipitation | default(0) | float(0) %}
                    {% if precip > 1.0 %}
                      {% set rf = 0.68 %}
                    {% elif precip > 0.2 %}
                      {% set rf = 0.82 %}
                    {% elif 'rain' in cond or 'regen' in cond or 'schauer' in cond %}
                      {% set rf = 0.76 %}
                    {% elif 'thunder' in cond or 'gewitter' in cond or 'lightning' in cond %}
                      {% set rf = 0.62 %}
                    {% else %}
                      {% set rf = 1.00 %}
                    {% endif %}
                  {% endif %}

                  {% set factor = ((cf * 0.70) + (rf * 0.30)) %}
                  {% set ns.sum = ns.sum + factor %}
                  {% set ns.cnt = ns.cnt + 1 %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% if ns.cnt > 0 %}
              {{ [[ns.sum / ns.cnt, 0.55] | max, 1.00] | min | round(2) }}
            {% else %}
              {# Kein Stundenforecast passend gefunden:
                 nicht mehr blind 1.00, sondern current condition oder konservativer Fallback. #}
              {% set curr = states(ent) | lower %}
              {% if curr in ['sunny', 'clear-night'] or 'sonnig' in curr or 'klar' in curr %}
                1.00
              {% elif curr in ['partlycloudy', 'partly-cloudy'] or 'partly' in curr or 'heiter' in curr or 'leicht' in curr %}
                0.90
              {% elif curr in ['cloudy'] or 'cloud' in curr or 'bewölkt' in curr or 'bedeckt' in curr or 'overcast' in curr %}
                0.75
              {% elif curr in ['fog'] or 'fog' in curr or 'nebel' in curr %}
                0.70
              {% elif curr in ['rainy', 'pouring'] or 'rain' in curr or 'regen' in curr or 'schauer' in curr %}
                0.62
              {% elif curr in ['lightning', 'lightning-rainy'] or 'thunder' in curr or 'gewitter' in curr %}
                0.55
              {% elif curr in ['snowy', 'snowy-rainy'] or 'snow' in curr or 'schnee' in curr %}
                0.60
              {% else %}
                {{ states('input_number.se_nf_weather_missing_forecast_factor') | float(0.85) | round(2) }}
              {% endif %}
            {% endif %}
          {% endif %}
        attributes:
          period: "today_06_10"
          note: "hourly forecast preferred; current weather/fallback if no matching hourly samples"
