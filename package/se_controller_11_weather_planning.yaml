  - sensor:
      - name: "SE NF PV Forecast Tomorrow Weather Adjusted"
        unique_id: se_nf_pv_forecast_tomorrow_weather_adjusted
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:weather-sunny-alert
        state: >-
          {% set pv = states('sensor.se_nf_pv_forecast_tomorrow') | float(0) %}
          {% set f = states('sensor.se_nf_weather_planning_factor_tomorrow') | float(1) %}
          {{ [pv * f, 0] | max | round(2) }}
      - name: "SE NF Remaining PV Today Weather Adjusted"
        unique_id: se_nf_remaining_pv_today_weather_adjusted
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:weather-sunny-alert
        state: >-
          {% set pv = states('sensor.se_nf_remaining_pv_today') | float(0) %}
          {% set f = states('sensor.se_nf_weather_planning_factor_today') | float(1) %}
          {{ [pv * f, 0] | max | round(2) }}
      - name: "SE NF Weather Current Factor"
        unique_id: se_nf_weather_current_factor
        icon: mdi:weather-cloudy
        state: >-
          {% if is_state('input_boolean.se_nf_weather_planning_enabled','off') %}
            1.00
          {% else %}
            {% set src = states('sensor.se_nf_weather_entity_resolved') %}
            {% set curr = states(src) | lower if src not in ['unknown','unavailable','none',''] else 'unknown' %}
            {% if curr in ['sunny', 'clear-night'] or 'sonnig' in curr or 'klar' in curr %}
              1.00
            {% elif curr in ['partlycloudy', 'partly-cloudy'] or 'partly' in curr or 'heiter' in curr or 'leicht' in curr %}
              0.90
            {% elif curr in ['cloudy'] or 'cloud' in curr or 'bewölkt' in curr or 'bedeckt' in curr or 'overcast' in curr %}
              0.75
            {% elif curr in ['fog'] or 'fog' in curr or 'nebel' in curr %}
              0.70
            {% elif curr in ['rainy', 'pouring'] or 'rain' in curr or 'regen' in curr or 'schauer' in curr %}
              0.62
            {% elif curr in ['lightning', 'lightning-rainy'] or 'thunder' in curr or 'gewitter' in curr %}
              0.55
            {% elif curr in ['snowy', 'snowy-rainy'] or 'snow' in curr or 'schnee' in curr %}
              0.60
            {% else %}
              {{ states('input_number.se_nf_weather_missing_forecast_factor') | float(0.85) | round(2) }}
            {% endif %}
          {% endif %}
        attributes:
          weather_entity: "{{ states('sensor.se_nf_weather_entity_resolved') }}"
          weather_state: >-
            {% set src = states('sensor.se_nf_weather_entity_resolved') %}
            {{ states(src) if src not in ['unknown','unavailable','none',''] else 'unknown' }}
      - name: "SE NF Weather Lead Minutes"
        unique_id: se_nf_weather_lead_minutes
        unit_of_measurement: "min"
        icon: mdi:weather-cloudy-clock
        state: >-
          {% if is_state('input_boolean.se_nf_weather_planning_enabled','off') %}
            0
          {% else %}
            {% set final = states('sensor.se_nf_weather_planning_factor_today') | float(1) %}
            {% set mid = states('sensor.se_nf_weather_factor_today_midday') | float(1) %}
            {% set aft = states('sensor.se_nf_weather_factor_today_afternoon') | float(1) %}
            {% set curr = states('sensor.se_nf_weather_current_factor') | float(1) %}
            {% set maxlead = states('input_number.se_nf_weather_max_lead_min') | int(90) %}

            {# V2.9.4c: Startzeit-Vorzug nutzt finalen Wetter-Planungsfaktor #}
            {% if aft < 0.70 or curr < 0.65 or final < 0.68 %}
              {{ maxlead }}
            {% elif final < 0.78 %}
              {{ [60, maxlead] | min }}
            {% elif final < 0.84 %}
              {{ [45, maxlead] | min }}
            {% elif final < 0.90 %}
              {{ [30, maxlead] | min }}
            {% else %}
              0
            {% endif %}
          {% endif %}
      - name: "SE NF Weather Lead Minutes Tomorrow"
        unique_id: se_nf_weather_lead_minutes_tomorrow
        unit_of_measurement: "min"
        icon: mdi:weather-cloudy-clock
        state: >-
          {% if is_state('input_boolean.se_nf_weather_planning_enabled','off') %}
            0
          {% else %}
            {% set mid = states('sensor.se_nf_weather_factor_tomorrow_midday') | float(1) %}
            {% set aft = states('sensor.se_nf_weather_factor_tomorrow_afternoon') | float(1) %}
            {% set maxlead = states('input_number.se_nf_weather_max_lead_min') | int(90) %}
            {% if aft < 0.70 %}
              {{ maxlead }}
            {% elif aft < 0.80 %}
              {{ [60, maxlead] | min }}
            {% elif mid < 0.75 %}
              {{ [45, maxlead] | min }}
            {% elif mid < 0.85 or aft < 0.88 %}
              {{ [30, maxlead] | min }}
            {% else %}
              0
            {% endif %}
          {% endif %}
      - name: "SE NF Weather Planning Factor Today"
        unique_id: se_nf_weather_planning_factor_today
        icon: mdi:weather-partly-cloudy
        state: >-
          {% if is_state('input_boolean.se_nf_weather_planning_enabled','off') %}
            1.00
          {% else %}
            {% set h = now().hour + (now().minute / 60) %}
            {% set m = states('sensor.se_nf_weather_factor_today_morning') | float(1) %}
            {% set d = states('sensor.se_nf_weather_factor_today_midday') | float(1) %}
            {% set a = states('sensor.se_nf_weather_factor_today_afternoon') | float(1) %}
            {% set curr = states('sensor.se_nf_weather_current_factor') | float(1) %}
            {% set w = states('input_number.se_nf_weather_current_weight_pct') | float(40) / 100 %}

            {% if h < 10 %}
              {% set base = ((m * 0.20) + (d * 0.35) + (a * 0.45)) %}
            {% elif h < 14 %}
              {% set base = ((d * 0.45) + (a * 0.55)) %}
            {% elif h < 19 %}
              {% set base = a %}
            {% else %}
              {% set base = 1.00 %}
            {% endif %}

            {# Current Weather Cap:
               Aktueller Zustand darf Prognose nicht verbessern.
               Wenn die konfigurierte Weather-Entity cloudy ist, wird aus 1.00 nicht mehr 1.00,
               sondern konservativ reduziert.
            #}
            {% set blended = (base * (1 - w)) + (curr * w) %}
            {% set final = [base, blended] | min %}
            {{ [[final, 0.55] | max, 1.00] | min | round(2) }}
          {% endif %}
      - name: "SE NF Weather Planning Factor Tomorrow"
        unique_id: se_nf_weather_planning_factor_tomorrow
        icon: mdi:weather-partly-cloudy
        state: >-
          {% if is_state('input_boolean.se_nf_weather_planning_enabled','off') %}
            1.00
          {% else %}
            {% set m = states('sensor.se_nf_weather_factor_tomorrow_morning') | float(1) %}
            {% set d = states('sensor.se_nf_weather_factor_tomorrow_midday') | float(1) %}
            {% set a = states('sensor.se_nf_weather_factor_tomorrow_afternoon') | float(1) %}
            {{ ((m * 0.20) + (d * 0.35) + (a * 0.45)) | round(2) }}
          {% endif %}
      - name: "SE NF Weather Planning Summary"
        unique_id: se_nf_weather_planning_summary
        icon: mdi:weather-partly-cloudy
        state: >-
          {% set src = states('sensor.se_nf_weather_entity_resolved') %}
          {% set curr_state = states(src) if src not in ['unknown','unavailable','none',''] else 'unknown' %}
          {% set curr_factor = states('sensor.se_nf_weather_current_factor') %}
          {% set tm = states('sensor.se_nf_weather_factor_today_morning') %}
          {% set td = states('sensor.se_nf_weather_factor_today_midday') %}
          {% set ta = states('sensor.se_nf_weather_factor_today_afternoon') %}
          {% set final = states('sensor.se_nf_weather_planning_factor_today') %}
          {% set lead = states('sensor.se_nf_weather_lead_minutes') %}
          Wetter {{ src }}={{ curr_state }} Faktor {{ curr_factor }} · früh {{ tm }} · mittag {{ td }} · nachmittag {{ ta }} · final {{ final
          }} · Vorzug {{ lead }} min
