# SolarEdge Energy Controller v0.0.1 · Modus Akku schonen
# Die fehlerhafte done↔armed-Reopen-Schleife wurde entfernt; nur Latch-Korrektur bleibt.

template:
  - sensor:
      - name: "SE NF Lifetime Latch Repair Status"
        unique_id: se_nf_lifetime_latch_repair_status
        icon: mdi:battery-sync
        state: >-
          {% set enabled = is_state('input_boolean.se_nf_lifetime_latch_repair_enabled','on') %}
          {% set mode = states('input_select.se_nf_optimization_mode') %}
          {% set session = states('input_select.se_nf_session_state') %}
          {% set latch = is_state('input_boolean.se_nf_lifetime_target_reached','on') %}
          {% set soe = states('sensor.se_nf_battery_soe') | float(0) %}
          {% set target = states('sensor.speicher_ziel_ladestand') | float(100) %}
          {% set need = states('sensor.se_nf_needed_energy') | float(0) %}
          {% set planned_ts = states('sensor.se_nf_today_planned_start_candidate_timestamp') | int(0) %}
          {% set now_ts = as_timestamp(now()) | int(0) %}
          {% set end_grace_ts = states('sensor.se_nf_today_end_with_grace_timestamp') | int(0) %}
          {% set in_window = planned_ts > 0 and planned_ts <= now_ts and (end_grace_ts <= 0 or now_ts <= end_grace_ts) %}
          {% if not enabled %}
            aus
          {% elif mode != 'Akku schonen' %}
            neutral · Modus {{ mode }}
          {% elif latch and soe < target - 1 %}
            repair_needed · Latch on, SoE {{ soe | round(1) }} < Ziel {{ target | round(1) }}
          {% elif session == 'done' and need > 0.1 and in_window and soe < target - 1 %}
            reopen_needed · done trotz Bedarf {{ need | round(2) }} kWh
          {% else %}
            ok · {{ session }} · Latch {{ 'on' if latch else 'off' }} · SoE {{ soe | round(1) }} / Ziel {{ target | round(1) }}
          {% endif %}
      - name: "SE NF Lifetime Latch Repair Version"
        unique_id: se_nf_lifetime_latch_repair_version
        icon: mdi:tag
        state: "2.9.3c-lifetime-latch-repair"
      - name: "Speicher Ziel Ladestand"
        unique_id: speicher_ziel_ladestand
        icon: mdi:battery-check
        unit_of_measurement: "%"
        state: >-
          {{ states('sensor.se_nf_effective_target_soc_pct') | float(states('input_number.se_nf_target_soc_pct') | float(0)) | round(1) }}
        attributes:
          speicherstrategie: "{{ states('sensor.se_nf_optimization_mode_effective') }}"
          planungsprofil: "{{ states('sensor.se_nf_planning_profile_effective') }}"
          quelle: "sensor.se_nf_effective_target_soc_pct"
          hinweis: "Kompatibilitaetsalias; keine zweite Zielberechnung."
      - name: SE Controller Akku schonen Charge Target
        unique_id: se_controller_battery_care_charge_target_w
        icon: mdi:battery-heart-variant
        state: "{% set open_w = states('input_number.se_nf_open_charge_limit_w') | float(5000) %}\n{% set closed_w = states('input_number.se_nf_closed_charge_limit_w')
          | float(0) %}\n{% if is_state('input_boolean.se_nf_lifetime_target_reached','on') %}\n  {{ closed_w | round(0) }}\n{% elif states('input_select.se_nf_session_state')
          in ['open','battery_full_open'] %}\n  {{ open_w | round(0) }}\n{% else %}\n  {{ closed_w | round(0) }}\n{% endif %}"
        unit_of_measurement: W
        device_class: power
        state_class: measurement
      - name: SE Controller Akku schonen Next Session State
        unique_id: se_controller_battery_care_next_session_state
        icon: mdi:state-machine
        state: "{% set enabled = is_state('input_boolean.se_netzdienlich_enabled','on') %}\n{% set cfg_ok = is_state('sensor.se_nf_config_check','ok')
          %}\n{% set sanity_ok = is_state('sensor.se_nf_sanity_check','ok') %}\n{% set now_ts = now().timestamp() | int(0) %}\n{% set day_start_ts
          = as_timestamp(today_at('06:00:00'), 0) | int(0) %}\n{% set planned_ts = as_timestamp(states('input_datetime.se_nf_session_planned_start'),
          0) | int(0) %}\n{% set candidate_ts = states('sensor.se_nf_today_planned_start_candidate_timestamp') | int(0) %}\n{% set end_ts = states('sensor.se_nf_today_end_timestamp')
          | int(0) %}\n{% set end_grace_ts = states('sensor.se_nf_today_end_with_grace_timestamp') | int(0) %}\n{% set min_hour = states('input_number.se_nf_lifetime_min_start_hour')
          | float(14.25) %}\n{% set min_h = min_hour | int(0) %}\n{% set min_m = ((min_hour - min_h) * 60) | round(0) | int(0) %}\n{% set min_ts
          = as_timestamp(today_at('%02d:%02d:00' | format(min_h, min_m)), 0) | int(0) %}\n{% set state_now = states('input_select.se_nf_session_state')
          %}\n{% set active = state_now in ['open','battery_full_open'] %}\n{% set critical_valid = is_state('input_boolean.se_nf_critical_deficit_latched_today','on')
          and planned_ts >= day_start_ts and planned_ts < end_ts and cfg_ok and sanity_ok and is_state('binary_sensor.se_nf_risk_flag','off')
          %}\n{% set planned_valid = (planned_ts >= min_ts and planned_ts < end_ts) or critical_valid %}\n{% set candidate_valid = candidate_ts
          >= min_ts and candidate_ts < end_ts %}\n{% set soe = states('sensor.se_nf_battery_soe') | float(0) %}\n{% set low = states('input_number.se_nf_low_soc_floor_pct')
          | float(25) %}\n{% set cap = states('sensor.se_nf_battery_capacity_kwh') | float(0) %}\n{% set reserve = states('sensor.se_nf_backup_reserve_pct')
          | float(0) %}\n{% set safety_kwh = states('input_number.se_nf_lifetime_safety_kwh') | float(1.0) %}\n{% set reserve_guard_soc = [low,
          reserve + (safety_kwh / cap * 100) if cap > 0 else low] | max %}\n{% set need = states('sensor.se_nf_needed_energy') | float(0) %}\n\
          {% set target_soc = states('sensor.se_nf_effective_target_soc_pct') | float(100) %}\n{% set forecast_status = states('sensor.se_nf_reserve_guard_forecast_status')
          %}\n{% set risk_age_s = now_ts - (as_timestamp(states.sensor.se_nf_reserve_guard_forecast_status.last_changed, now_ts) | int(0)) %}\n\
          {% set reserve_enter = need > 0.05 and soe <= reserve_guard_soc %}\n{% set reserve_hold = state_now == 'low_soc' and soe < target_soc
          %}\n{% set forecast_enter = state_now in ['closed','armed'] and forecast_status == 'risk' and risk_age_s >= 180 and need > 0.05 %}\n\
          {% set evcc = is_state('binary_sensor.se_nf_evcc_grid_charge_request','on') %}\n{% set lifetime_reached = is_state('input_boolean.se_nf_lifetime_target_reached','on')
          %}\n{% set target_gap = [states('sensor.speicher_ziel_ladestand') | float(100) - soe, 0] | max %}\n{% set late_eligible = active and
          not lifetime_reached and target_gap >= 1.0 and need > 0.10 and end_ts > 0 %}\n{% set effective_end_ts = [end_grace_ts, end_ts + 5400]
          | max if late_eligible else end_grace_ts %}\n{% if not enabled %}\n  closed\n{% elif evcc %}\n  evcc_override\n{% elif not cfg_ok or
          not sanity_ok %}\n  risk\n{% elif reserve_enter or forecast_enter or reserve_hold %}\n  low_soc\n{% elif lifetime_reached or need <=
          0.05 %}\n  done\n{% elif active and effective_end_ts > 0 and now_ts <= effective_end_ts %}\n  {{ 'battery_full_open' if need <= 0.05
          else 'open' }}\n{% elif active and effective_end_ts > 0 and now_ts > effective_end_ts %}\n  done\n{% elif end_ts > 0 and now_ts >= end_ts
          %}\n  done\n{% elif planned_valid and planned_ts > 0 and now_ts >= planned_ts %}\n  {{ 'battery_full_open' if need <= 0.05 else 'open'
          }}\n{% elif planned_valid and planned_ts > 0 %}\n  armed\n{% elif candidate_valid %}\n  armed\n{% else %}\n  closed\n{% endif %}"
  # MIGRATED_FROM: packages/se_nf_13_resilience_target.yaml
  - sensor:
      - name: "SE NF Historical Daytime Consumption 7d Dynamic"
        unique_id: se_nf_historical_daytime_consumption_7d_dynamic
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:home-sun
        state: >-
          {% set raw = states('sensor.se_nf_daytime_consumption_7d_dynamic') %}
          {% set valid = state_attr('sensor.se_nf_daytime_consumption_7d_dynamic', 'valid') | default(false, true) %}
          {% set bad = ['unknown','unavailable','none','None',''] %}
          {% set total = state_attr('sensor.se_nf_load_forecast_7d_cached', 'avg_day_total') | float(states('input_number.se_nf_manual_daily_consumption_kwh') | float(0)) %}
          {% set night = states('sensor.se_nf_lifetime_night_energy_forecast') | float(0) %}
          {% if valid and raw not in bad and (raw | float(0)) > 0 %}
            {{ raw | float(0) | round(2) }}
          {% else %}
            {{ ([total - night, 0] | max) | round(2) }}
          {% endif %}
        attributes:
          source: >-
            {% set raw = states('sensor.se_nf_daytime_consumption_7d_dynamic') %}
            {% set valid = state_attr('sensor.se_nf_daytime_consumption_7d_dynamic', 'valid') | default(false, true) %}
            {{ state_attr('sensor.se_nf_daytime_consumption_7d_dynamic', 'source') if valid and raw not in ['unknown','unavailable','none','None',''] and (raw | float(0)) > 0 else 'avg_day_total_minus_night_fallback' }}
          valid_days: "{{ state_attr('sensor.se_nf_daytime_consumption_7d_dynamic', 'valid_days') }}"
          window_start: "{{ state_attr('sensor.se_nf_daytime_consumption_7d_dynamic', 'window_start') }}"
          window_end: "{{ state_attr('sensor.se_nf_daytime_consumption_7d_dynamic', 'window_end') }}"
          minimum_kwh: "{{ state_attr('sensor.se_nf_daytime_consumption_7d_dynamic', 'minimum_kwh') }}"
          maximum_kwh: "{{ state_attr('sensor.se_nf_daytime_consumption_7d_dynamic', 'maximum_kwh') }}"
          mean_kwh: "{{ state_attr('sensor.se_nf_daytime_consumption_7d_dynamic', 'mean_kwh') }}"
          median_kwh: "{{ state_attr('sensor.se_nf_daytime_consumption_7d_dynamic', 'median_kwh') }}"
          error: "{{ state_attr('sensor.se_nf_daytime_consumption_7d_dynamic', 'error') }}"
      - name: "SE NF Dynamic Safety Energy"
        unique_id: se_nf_dynamic_safety_energy
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:shield-sun-outline
        state: >-
          {% set entity =
            'sensor.se_nf_night_consumption_7d_dynamic'
          %}
          {% set valid =
            state_attr(entity, 'valid')
            | default(false, true)
          %}
          {% set valid_nights =
            state_attr(entity, 'valid_nights') | int(0)
          %}
          {% set morning_valid_nights =
            state_attr(entity, 'morning_valid_nights')
            | int(0)
          %}
          {% set median_raw =
            state_attr(entity, 'median_kwh')
          %}
          {% set p80_raw =
            state_attr(entity, 'p80_kwh')
          %}
          {% set morning_p80_raw =
            state_attr(entity, 'morning_p80_kwh')
          %}
          {% set window_raw =
            state_attr(entity, 'morning_window_hours')
          %}
          {% set bad =
            [none, 'unknown', 'unavailable', 'none', 'None', '']
          %}
          {% set history_ok =
            valid
            and valid_nights >= 3
            and morning_valid_nights >= 3
            and median_raw not in bad
            and p80_raw not in bad
            and morning_p80_raw not in bad
            and window_raw not in bad
          %}
          {% set manual =
            states(
              'input_number.se_nf_lifetime_safety_kwh'
            ) | float(1.0)
          %}
          {% if history_ok %}
            {% set median = median_raw | float(0) %}
            {% set p80 = p80_raw | float(median) %}
            {% set morning_p80 =
              morning_p80_raw | float(0)
            %}
            {% set morning_window =
              window_raw | float(0)
            %}
            {% set weather_factor =
              states(
                'sensor.se_nf_weather_planning_factor_tomorrow'
              ) | float(1)
            %}
            {% set weather_factor =
              [[weather_factor, 0.55] | max, 1.0] | min
            %}
            {% set weather_delay_min =
              (1 - weather_factor) * 180
            %}
            {% set variability =
              [p80 - median, 0] | max
            %}
            {% set morning_rate =
              morning_p80 / morning_window
              if morning_window > 0
              else 0
            %}
            {% set weather_delay =
              morning_rate * weather_delay_min / 60
            %}
            {{
              [[variability + weather_delay, 0] | max, 5]
              | min
              | round(2)
            }}
          {% else %}
            {{ [[manual, 0] | max, 5] | min | round(2) }}
          {% endif %}
        attributes:
          source: >-
            {% set entity =
              'sensor.se_nf_night_consumption_7d_dynamic'
            %}
            {% set bad =
              [none, 'unknown', 'unavailable', 'none', 'None', '']
            %}
            {% set valid =
              state_attr(entity, 'valid')
              | default(false, true)
            %}
            {% set ok =
              valid
              and state_attr(entity, 'valid_nights') | int(0) >= 3
              and state_attr(entity, 'morning_valid_nights')
                  | int(0) >= 3
              and state_attr(entity, 'median_kwh') not in bad
              and state_attr(entity, 'p80_kwh') not in bad
              and state_attr(entity, 'morning_p80_kwh') not in bad
              and state_attr(entity, 'morning_window_hours')
                  not in bad
            %}
            {{
              'dynamic_p80_morning'
              if ok
              else 'manual_fallback'
            }}
          history_valid: >-
            {% set entity =
              'sensor.se_nf_night_consumption_7d_dynamic'
            %}
            {% set bad =
              [none, 'unknown', 'unavailable', 'none', 'None', '']
            %}
            {% set valid =
              state_attr(entity, 'valid')
              | default(false, true)
            %}
            {% set ok =
              valid
              and state_attr(entity, 'valid_nights') | int(0) >= 3
              and state_attr(entity, 'morning_valid_nights')
                  | int(0) >= 3
              and state_attr(entity, 'median_kwh') not in bad
              and state_attr(entity, 'p80_kwh') not in bad
              and state_attr(entity, 'morning_p80_kwh') not in bad
              and state_attr(entity, 'morning_window_hours')
                  not in bad
            %}
            {{ ok }}
          night_median_kwh: >-
            {{
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'median_kwh'
              )
            }}
          night_p80_kwh: >-
            {{
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'p80_kwh'
              )
            }}
          night_variability_kwh: >-
            {% set median =
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'median_kwh'
              ) | float(0)
            %}
            {% set p80 =
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'p80_kwh'
              ) | float(median)
            %}
            {{ ([p80 - median, 0] | max) | round(2) }}
          morning_p80_kwh: >-
            {{
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'morning_p80_kwh'
              )
            }}
          morning_window_hours: >-
            {{
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'morning_window_hours'
              )
            }}
          morning_rate_kwh_h: >-
            {% set energy =
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'morning_p80_kwh'
              ) | float(0)
            %}
            {% set hours =
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'morning_window_hours'
              ) | float(0)
            %}
            {{
              (energy / hours) | round(3)
              if hours > 0
              else 0
            }}
          weather_factor_tomorrow: >-
            {% set value =
              states(
                'sensor.se_nf_weather_planning_factor_tomorrow'
              ) | float(1)
            %}
            {{ [[value, 0.55] | max, 1.0] | min | round(2) }}
          weather_delay_minutes: >-
            {% set value =
              states(
                'sensor.se_nf_weather_planning_factor_tomorrow'
              ) | float(1)
            %}
            {% set value =
              [[value, 0.55] | max, 1.0] | min
            %}
            {{ ((1 - value) * 180) | round(0) }}
          weather_delay_energy_kwh: >-
            {% set energy =
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'morning_p80_kwh'
              ) | float(0)
            %}
            {% set hours =
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'morning_window_hours'
              ) | float(0)
            %}
            {% set factor =
              states(
                'sensor.se_nf_weather_planning_factor_tomorrow'
              ) | float(1)
            %}
            {% set factor =
              [[factor, 0.55] | max, 1.0] | min
            %}
            {% set delay = (1 - factor) * 180 %}
            {{
              (
                (energy / hours) * delay / 60
                if hours > 0
                else 0
              ) | round(2)
            }}
          manual_fallback_kwh: >-
            {{
              states(
                'input_number.se_nf_lifetime_safety_kwh'
              )
            }}
          valid_nights: >-
            {{
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'valid_nights'
              )
            }}
          morning_valid_nights: >-
            {{
              state_attr(
                'sensor.se_nf_night_consumption_7d_dynamic',
                'morning_valid_nights'
              )
            }}
          formula: >-
            max(P80 Nacht - Median Nacht, 0)
            + P80-Morgenrate * ((1 - Wetterfaktor morgen) * 3 h)

      - name: "SE NF Resilience Required Energy"
        unique_id: se_nf_resilience_required_energy
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:battery-clock-outline
        state: >-
          {% set night =
            states(
              'sensor.se_nf_lifetime_night_energy_forecast'
            ) | float(0)
          %}
          {% set daytime =
            states(
              'sensor.se_nf_historical_daytime_consumption_7d_dynamic'
            ) | float(0)
          %}
          {% set factor =
            1
            + (
                states(
                  'input_number.se_nf_lifetime_soc_buffer_pct'
                ) | float(0)
              ) / 100
          %}
          {% set n = night * factor %}
          {% set d = daytime * factor %}
          {% set pv1 =
            states(
              'sensor.se_nf_pv_forecast_tomorrow_weather_adjusted'
            ) | float(0)
          %}
          {% set src2 =
            states(
              'sensor.se_nf_adaptive_pv_overmorrow_source'
            )
          %}
          {% set valid2 =
            src2.startswith('sensor.')
            and states(src2)
                not in ['unknown','unavailable','none','None','']
          %}
          {% set pv2 =
            (
              states('sensor.se_nf_adaptive_pv_overmorrow')
              | float(0)
            )
            *
            (
              states(
                'sensor.se_nf_weather_planning_factor_tomorrow'
              ) | float(1)
            )
            if valid2
            else 0
          %}
          {% set s1 = n %}
          {% set s2 = s1 + d - pv1 %}
          {% set s3 = s2 + n %}
          {% set s4 = s3 + d - pv2 %}
          {% set base =
            [0, s1, s2, s3, s4] | max
            if valid2
            else [0, s1, s2, s3] | max
          %}
          {% set safety =
            states(
              'sensor.se_nf_dynamic_safety_energy'
            ) | float(
              states(
                'input_number.se_nf_lifetime_safety_kwh'
              ) | float(0)
            )
          %}
          {{ (base + safety) | round(2) }}
        attributes:
          source: "cumulative_segmented_forecast"
          night_kwh: >-
            {{
              states(
                'sensor.se_nf_lifetime_night_energy_forecast'
              )
            }}
          daytime_kwh: >-
            {{
              states(
                'sensor.se_nf_historical_daytime_consumption_7d_dynamic'
              )
            }}
          daytime_source: >-
            {{
              state_attr(
                'sensor.se_nf_historical_daytime_consumption_7d_dynamic',
                'source'
              )
            }}
          buffer_pct: >-
            {{
              states(
                'input_number.se_nf_lifetime_soc_buffer_pct'
              )
            }}
          buffered_night_kwh: >-
            {% set value =
              states(
                'sensor.se_nf_lifetime_night_energy_forecast'
              ) | float(0)
            %}
            {% set buffer =
              states(
                'input_number.se_nf_lifetime_soc_buffer_pct'
              ) | float(0)
            %}
            {{ (value * (1 + buffer / 100)) | round(2) }}
          buffered_daytime_kwh: >-
            {% set value =
              states(
                'sensor.se_nf_historical_daytime_consumption_7d_dynamic'
              ) | float(0)
            %}
            {% set buffer =
              states(
                'input_number.se_nf_lifetime_soc_buffer_pct'
              ) | float(0)
            %}
            {{ (value * (1 + buffer / 100)) | round(2) }}
          pv_tomorrow_kwh: >-
            {{
              states(
                'sensor.se_nf_pv_forecast_tomorrow_weather_adjusted'
              )
            }}
          pv_overmorrow_source: >-
            {{
              states(
                'sensor.se_nf_adaptive_pv_overmorrow_source'
              )
            }}
          pv_overmorrow_valid: >-
            {% set src =
              states(
                'sensor.se_nf_adaptive_pv_overmorrow_source'
              )
            %}
            {{
              src.startswith('sensor.')
              and states(src)
                  not in
                  ['unknown','unavailable','none','None','']
            }}
          pv_overmorrow_effective_kwh: >-
            {% set src =
              states(
                'sensor.se_nf_adaptive_pv_overmorrow_source'
              )
            %}
            {% set valid =
              src.startswith('sensor.')
              and states(src)
                  not in
                  ['unknown','unavailable','none','None','']
            %}
            {% set raw =
              states(
                'sensor.se_nf_adaptive_pv_overmorrow'
              ) | float(0)
            %}
            {% set weather =
              states(
                'sensor.se_nf_weather_planning_factor_tomorrow'
              ) | float(1)
            %}
            {{ ((raw * weather) if valid else 0) | round(2) }}
          planning_horizon: >-
            {% set src =
              states(
                'sensor.se_nf_adaptive_pv_overmorrow_source'
              )
            %}
            {% set valid =
              src.startswith('sensor.')
              and states(src)
                  not in
                  ['unknown','unavailable','none','None','']
            %}
            {{
              'through_day_2'
              if valid
              else 'through_night_2'
            }}
          safety_kwh: >-
            {{
              states(
                'sensor.se_nf_dynamic_safety_energy'
              )
            }}
          safety_source: >-
            {{
              state_attr(
                'sensor.se_nf_dynamic_safety_energy',
                'source'
              )
            }}
          manual_safety_fallback_kwh: >-
            {{
              states(
                'input_number.se_nf_lifetime_safety_kwh'
              )
            }}

      - name: "SE NF Resilience Target Pct"
        unique_id: se_nf_resilience_target_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:battery-heart-variant
        state: >-
          {% set cap =
            states(
              'sensor.se_nf_battery_capacity_kwh'
            ) | float(0)
          %}
          {% set reserve =
            states(
              'sensor.se_nf_backup_reserve_pct'
            ) | float(0)
          %}
          {% set required =
            states(
              'sensor.se_nf_resilience_required_energy'
            ) | float(0)
          %}
          {% set minimum =
            states(
              'input_number.se_nf_lifetime_min_soc_pct'
            ) | float(45)
          %}
          {% set maximum =
            states(
              'input_number.se_nf_lifetime_max_soc_pct'
            ) | float(85)
          %}
          {% set raw =
            reserve + required / cap * 100
            if cap > 0
            else maximum
          %}
          {{
            [[raw, minimum] | max, maximum]
            | min
            | round(1)
          }}
        attributes:
          source: "resilience_cumulative_24_48h"
          raw_target_pct: >-
            {% set cap =
              states(
                'sensor.se_nf_battery_capacity_kwh'
              ) | float(0)
            %}
            {% set reserve =
              states(
                'sensor.se_nf_backup_reserve_pct'
              ) | float(0)
            %}
            {% set required =
              states(
                'sensor.se_nf_resilience_required_energy'
              ) | float(0)
            %}
            {{
              (reserve + required / cap * 100) | round(1)
              if cap > 0
              else 'unknown'
            }}
          required_energy_kwh: >-
            {{
              states(
                'sensor.se_nf_resilience_required_energy'
              )
            }}
          uncovered_at_max_kwh: >-
            {% set required =
              states(
                'sensor.se_nf_resilience_required_energy'
              ) | float(0)
            %}
            {% set cap =
              states(
                'sensor.se_nf_battery_capacity_kwh'
              ) | float(0)
            %}
            {% set reserve =
              states(
                'sensor.se_nf_backup_reserve_pct'
              ) | float(0)
            %}
            {% set maximum =
              states(
                'input_number.se_nf_lifetime_max_soc_pct'
              ) | float(85)
            %}
            {% set available =
              cap
              * ([maximum - reserve, 0] | max)
              / 100
            %}
            {{
              ([required - available, 0] | max)
              | round(2)
            }}
          planning_horizon: >-
            {{
              state_attr(
                'sensor.se_nf_resilience_required_energy',
                'planning_horizon'
              )
            }}

  - binary_sensor:
      - name: "SE NF Resilience Capacity Risk"
        unique_id: se_nf_resilience_capacity_risk
        device_class: problem
        icon: mdi:battery-alert-variant-outline
        state: >-
          {{
            state_attr(
              'sensor.se_nf_resilience_target_pct',
              'uncovered_at_max_kwh'
            ) | float(0) > 0.10
          }}
        attributes:
          uncovered_kwh: >-
            {{
              state_attr(
                'sensor.se_nf_resilience_target_pct',
                'uncovered_at_max_kwh'
              )
            }}
          message: >-
            {% set gap =
              state_attr(
                'sensor.se_nf_resilience_target_pct',
                'uncovered_at_max_kwh'
              ) | float(0)
            %}
            {{
              'Bedarf übersteigt nutzbare Energie bis Max-SoC.'
              if gap > 0.10
              else
              'Bedarf innerhalb des Max-SoC abdeckbar.'
            }}

automation:
  - id: se_nf_v29_lifetime_latch_reset
    alias: "SolarEdge Energy Controller: Akku-Schonung – Lebensdauer-Latch zurücksetzen"
    mode: single
    trigger:
      - platform: time
        at: "06:00:00"
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - input_select.se_nf_optimization_mode
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {{ trigger.platform == 'time'
                     or states('input_select.se_nf_optimization_mode') != 'Akku schonen' }}
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.se_nf_lifetime_target_reached
  - id: se_nf_v29_lifetime_target_latch
    alias: "SolarEdge Energy Controller: Akku-Schonung – Ziel erreicht"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id:
          - sensor.se_nf_battery_soe
          - sensor.speicher_ziel_ladestand
          - input_select.se_nf_session_state
          - input_select.se_nf_optimization_mode
    condition:
      - condition: state
        entity_id: input_boolean.se_netzdienlich_enabled
        state: "on"
      - condition: state
        entity_id: input_select.se_nf_optimization_mode
        state: "Akku schonen"
      - condition: template
        value_template: >-
          {{
            states('input_select.se_nf_session_state')
            not in ['evcc_override','low_soc','risk']
          }}
      - condition: template
        value_template: >-
          {{ states('sensor.se_nf_battery_soe') | float(0)
             >= states('sensor.speicher_ziel_ladestand') | float(100) }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.se_nf_lifetime_target_reached
  - id: se_nf_v293c_lifetime_latch_repair
    alias: "SolarEdge Energy Controller: Akku-Schonung – Lebensdauer-Latch reparieren"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id:
          - input_boolean.se_nf_lifetime_target_reached
          - input_select.se_nf_session_state
          - sensor.se_nf_battery_soe
          - sensor.speicher_ziel_ladestand
          - sensor.se_nf_needed_energy
          - sensor.se_nf_today_planned_start_candidate_timestamp
          - sensor.se_nf_today_end_with_grace_timestamp
    condition:
      - condition: state
        entity_id: input_boolean.se_nf_lifetime_latch_repair_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.se_netzdienlich_enabled
        state: "on"
      - condition: state
        entity_id: input_select.se_nf_optimization_mode
        state: "Akku schonen"
      - condition: state
        entity_id: sensor.se_nf_config_check
        state: "ok"
      - condition: state
        entity_id: sensor.se_nf_sanity_check
        state: "ok"
      - condition: state
        entity_id: binary_sensor.se_nf_risk_flag
        state: "off"
    action:
      - variables:
          session: "{{ states('input_select.se_nf_session_state') }}"
          latch_on: "{{ is_state('input_boolean.se_nf_lifetime_target_reached','on') }}"
          soe: "{{ states('sensor.se_nf_battery_soe') | float(0) }}"
          target: "{{ states('sensor.speicher_ziel_ladestand') | float(100) }}"
          need: "{{ states('sensor.se_nf_needed_energy') | float(0) }}"
          planned_ts: "{{ states('sensor.se_nf_today_planned_start_candidate_timestamp') | int(0) }}"
          end_grace_ts: "{{ states('sensor.se_nf_today_end_with_grace_timestamp') | int(0) }}"
          now_ts: "{{ as_timestamp(now()) | int(0) }}"
          start_due: "{{ planned_ts | int(0) > 0 and planned_ts | int(0) <= now_ts | int(0) }}"
          before_end: "{{ end_grace_ts | int(0) <= 0 or now_ts | int(0) <= end_grace_ts | int(0) }}"
          latch_wrong: "{{ latch_on and soe | float(0) < (target | float(100) - 1.0) }}"
          reopen_needed: >-
            {{ session == 'done'
               and need | float(0) > 0.10
               and start_due
               and before_end
               and soe | float(0) < (target | float(100) - 1.0) }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ latch_wrong }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.se_nf_lifetime_target_reached
