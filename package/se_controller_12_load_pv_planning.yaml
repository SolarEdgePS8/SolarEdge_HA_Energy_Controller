# SolarEdge Energy Controller v0.0.1 · Last- und PV-Planung
# Verbrauchsprognose, PV-Prognose und Deckungsberechnung.

template:
  - sensor:
      - name: "SE NF Available PV For Battery Today"
        unique_id: se_nf_available_pv_for_battery_today
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:battery-solar
        state: >-
          {% set pv = states('sensor.se_nf_remaining_pv_today_weather_adjusted') | float(states('sensor.se_nf_remaining_pv_today') | float(0))
          %}
          {% set cons = states('sensor.se_nf_remaining_consumption_today') | float(0) %}
          {{ [pv - cons, 0] | max | round(2) }}
      - name: "SE NF Coverage Ratio"
        unique_id: se_nf_coverage_ratio
        icon: mdi:chart-pie
        state: >-
          {% set avail = states('sensor.se_nf_available_pv_for_battery_today') | float(0) %}
          {% set need = states('sensor.se_nf_needed_energy') | float(0) %}
          {% if need <= 0.05 %}
            99
          {% else %}
            {{ (avail / need) | round(2) }}
          {% endif %}
      - name: "SE NF Load Forecast Correction Factor"
        unique_id: se_nf_load_forecast_correction_factor
        icon: mdi:tune-vertical
        state: >-
          {% set expected = states('sensor.se_nf_load_forecast_until_now_7d') | float(0) %}
          {% set bad = ['unknown','unavailable','none','None',''] %}
            {% set actual_e = states('input_text.se_nf_daily_consumption_entity') | trim %}
            {% set actual = states(actual_e) | float(0) if actual_e not in bad else 0 %}
          {% set h = now().hour + (now().minute / 60) %}
          {% if h < 8 or expected < 0.5 %}
            1.00
          {% else %}
            {% set raw = actual / expected if expected > 0 else 1 %}
            {{ [[raw, 0.75] | max, 1.35] | min | round(2) }}
          {% endif %}
        attributes:
          actual_until_now: >-
            {% set e = states('input_text.se_nf_daily_consumption_entity') | trim %}
            {{ states(e) if e not in ['unknown','unavailable','none','None',''] else 'unknown' }}
          expected_until_now_7d: "{{ states('sensor.se_nf_load_forecast_until_now_7d') }}"
      - name: "SE NF Load Forecast Remaining 7d"
        unique_id: se_nf_load_forecast_remaining_7d
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:chart-timeline-variant
        state: >-
          {% set v = states('sensor.se_nf_load_forecast_7d_cached') %}
          {% set days = state_attr('sensor.se_nf_load_forecast_7d_cached','days') | int(0) %}
          {% if v not in ['unknown','unavailable','none',''] and days >= 3 and (v | float(0)) > 0 %}
            {{ [v | float(0), 0] | max | round(2) }}
          {% else %}
            0
          {% endif %}
        attributes:
          valid: >-
            {% set v = states('sensor.se_nf_load_forecast_7d_cached') %}
            {% set days = state_attr('sensor.se_nf_load_forecast_7d_cached','days') | int(0) %}
            {{ v not in ['unknown','unavailable','none',''] and days >= 3 and (v | float(0)) > 0 }}
          days: "{{ state_attr('sensor.se_nf_load_forecast_7d_cached','days') }}"
          samples_total: "{{ state_attr('sensor.se_nf_load_forecast_7d_cached','samples_total') }}"
          min_remaining: "{{ state_attr('sensor.se_nf_load_forecast_7d_cached','min_remaining') }}"
          max_remaining: "{{ state_attr('sensor.se_nf_load_forecast_7d_cached','max_remaining') }}"
          avg_day_total: "{{ state_attr('sensor.se_nf_load_forecast_7d_cached','avg_day_total') }}"
      - name: "SE NF Load Forecast Source"
        unique_id: se_nf_load_forecast_source
        icon: mdi:database-search
        state: >-
          {% set hist = states('sensor.se_nf_load_forecast_remaining_7d') %}
          {% if hist not in ['unknown','unavailable','none',''] and (hist | float(0)) > 0 %}
            sql_7d_profile
          {% else %}
            manual_simple_v28
          {% endif %}
      - name: "SE NF Load Forecast Summary"
        unique_id: se_nf_load_forecast_summary
        icon: mdi:clipboard-pulse-outline
        state: >-
          {% set src = states('sensor.se_nf_load_forecast_source') %}
          {% set eff = states('sensor.se_nf_remaining_consumption_effective') %}
          {% set sql = states('sensor.se_nf_load_forecast_remaining_7d') %}
          {% set manual = states('sensor.se_nf_remaining_consumption_manual_simple') %}
          {% set corr = states('sensor.se_nf_load_forecast_correction_factor') %}
          {% set days = state_attr('sensor.se_nf_load_forecast_7d_cached','days') | int(0) %}
          Verbrauch {{ src }} · Rest effektiv {{ eff }} kWh · SQL {{ sql }} kWh · manuell {{ manual }} kWh · Faktor {{ corr }} · Tage {{ days
          }}
      - name: "SE NF Load Forecast Until Now 7d"
        unique_id: se_nf_load_forecast_until_now_7d
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:chart-timeline
        state: >-
          {% set v = state_attr('sensor.se_nf_load_forecast_7d_cached','until_now') %}
          {% if v not in ['unknown','unavailable','none',''] and v is not none and (v | float(0)) > 0 %}
            {{ [v | float(0), 0] | max | round(2) }}
          {% else %}
            0
          {% endif %}
        attributes:
          valid: >-
            {% set v = state_attr('sensor.se_nf_load_forecast_7d_cached','until_now') %}
            {{ v not in ['unknown','unavailable','none',''] and v is not none and (v | float(0)) > 0 }}
      - name: "SE NF PV Forecast Today Total"
        unique_id: se_nf_pv_forecast_today_total
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:solar-power-variant
        state: >-
          {% set e = states('input_text.se_nf_pv_today_total_entity') | trim %}
          {% set bad = ['unknown', 'unavailable', 'none', 'None', ''] %}
          {% if e not in bad %}
            {% set raw = states(e) %}
            {% if raw not in bad %}
              {{ [raw | float(0), 0] | max | round(2) }}
            {% else %}
              0.0
            {% endif %}
          {% else %}
            0.0
          {% endif %}
      - name: "SE NF PV Forecast Tomorrow"
        unique_id: se_nf_pv_forecast_tomorrow
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:weather-sunny
        state: >-
          {% set e = states('input_text.se_nf_pv_tomorrow_entity') | trim %}
          {% set bad = ['unknown', 'unavailable', 'none', 'None', ''] %}
          {% if e not in bad %}
            {% set raw = states(e) %}
            {% if raw not in bad %}
              {{ [raw | float(0), 0] | max | round(2) }}
            {% else %}
              0.0
            {% endif %}
          {% else %}
            0.0
          {% endif %}
      - name: "SE NF Remaining Consumption Effective"
        unique_id: se_nf_remaining_consumption_effective
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:home-analytics
        state: >-
          {% set manual = states('sensor.se_nf_remaining_consumption_manual_simple') | float(0) %}
          {% set hist_raw = states('sensor.se_nf_load_forecast_remaining_7d') %}
          {% set corr = states('sensor.se_nf_load_forecast_correction_factor') | float(1) %}
          {% set safety = states('input_number.se_nf_load_forecast_safety_factor') | float(1.05) %}
          {% if hist_raw not in ['unknown','unavailable','none',''] and (hist_raw | float(0)) > 0 %}
            {% set hist = hist_raw | float(0) * corr * safety %}
            {{ [manual, hist] | max | round(2) }}
          {% else %}
            {{ manual | round(2) }}
          {% endif %}
        attributes:
          manual_simple_kwh: "{{ states('sensor.se_nf_remaining_consumption_manual_simple') }}"
          sql_remaining_7d_kwh: "{{ states('sensor.se_nf_load_forecast_remaining_7d') }}"
          correction_factor: "{{ states('sensor.se_nf_load_forecast_correction_factor') }}"
          safety_factor: "{{ states('input_number.se_nf_load_forecast_safety_factor') }}"
          note: "V2.8.9a: effective = max(manual_simple, sql_7d * correction * safety)."
      - name: "SE NF Remaining Consumption Manual Simple"
        unique_id: se_nf_remaining_consumption_manual_simple
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:home-lightning-bolt-outline
        state: >-
          {% set daily = states('input_number.se_nf_manual_daily_consumption_kwh') | float(8) %}
          {% set h = now().hour + (now().minute / 60) %}
          {% set remaining_fraction = [[(24 - h) / 24, 0] | max, 1] | min %}
          {{ (daily * remaining_fraction) | round(2) }}
      - name: "SE NF Remaining Consumption Today"
        unique_id: se_nf_remaining_consumption_today
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:home-lightning-bolt-outline
        state: >-
          {{ states('sensor.se_nf_remaining_consumption_effective') | float(states('sensor.se_nf_remaining_consumption_manual_simple') | float(0))
          | round(2) }}
        attributes:
          source: "{{ states('sensor.se_nf_load_forecast_source') }}"
          manual_simple_kwh: "{{ states('sensor.se_nf_remaining_consumption_manual_simple') }}"
          effective_kwh: "{{ states('sensor.se_nf_remaining_consumption_effective') }}"
      - name: "SE NF Remaining PV Today"
        unique_id: se_nf_remaining_pv_today
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:solar-power
        state: >-
          {% set e = states('input_text.se_nf_pv_today_remaining_entity') | trim %}
          {% set bad = ['unknown', 'unavailable', 'none', 'None', ''] %}
          {% if e not in bad %}
            {% set raw = states(e) %}
            {% if raw not in bad %}
              {{ [raw | float(0), 0] | max | round(2) }}
            {% else %}
              0.0
            {% endif %}
          {% else %}
            0.0
          {% endif %}
