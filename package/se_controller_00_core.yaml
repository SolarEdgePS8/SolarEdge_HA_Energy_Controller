template:
  - sensor:
      - name: "SE NF Battery SoE"
        unique_id: se_nf_battery_soe
        unit_of_measurement: "%"
        icon: mdi:battery-heart
        state: >-
          {% set e = states('input_text.se_nf_battery_soe_entity') | trim %}
          {% if e and states(e) not in ['unknown','unavailable','none',''] %}
            {{ [[states(e) | float(0), 0] | max, 100] | min | round(1) }}
          {% else %}
            unavailable
          {% endif %}
      - name: "SE NF Backup Reserve Pct"
        unique_id: se_nf_backup_reserve_pct
        unit_of_measurement: "%"
        icon: mdi:battery-lock
        state: >-
          {% set e =
            states('input_text.se_nf_backup_reserve_entity') | trim
          %}
          {% set bad =
            ['unknown','unavailable','none','None','']
          %}
          {% set fallback =
            states(
              'input_number.se_nf_backup_reserve_fallback_pct'
            ) | float(0)
          %}
          {% if e not in bad and states(e) not in bad %}
            {{
              [[states(e) | float(0), 0] | max, 100]
              | min
              | round(1)
            }}
          {% else %}
            {{
              [[fallback, 0] | max, 100]
              | min
              | round(1)
            }}
          {% endif %}
        attributes:
          source: >-
            {% set e =
              states('input_text.se_nf_backup_reserve_entity') | trim
            %}
            {% set bad =
              ['unknown','unavailable','none','None','']
            %}
            {% if e in bad %}
              no_backup_or_manual_fallback
            {% elif states(e) in bad %}
              configured_entity_unavailable_fallback
            {% else %}
              mapped_entity
            {% endif %}
          mapped_entity: >-
            {{
              states('input_text.se_nf_backup_reserve_entity')
              | trim
            }}
          mapped_state: >-
            {% set e =
              states('input_text.se_nf_backup_reserve_entity') | trim
            %}
            {{ states(e) if e else 'not_configured' }}
          fallback_pct: >-
            {{
              states(
                'input_number.se_nf_backup_reserve_fallback_pct'
              )
            }}
      - name: "SE NF Planning Profile Effective"
        unique_id: se_nf_planning_profile_effective
        icon: mdi:source-branch
        state: >-
          {% set selected = states('sensor.se_nf_optimization_mode_effective') %}

          {% if selected == 'EVOpt optimiert' %}
            Netzdienlich laden
          {% elif selected in ['Eigenverbrauch maximieren','Netzdienlich laden','Akku schonen'] %}
            {{ selected }}
          {% else %}
            Netzdienlich laden
          {% endif %}
        attributes:
          selected_mode: "{{ states('sensor.se_nf_optimization_mode_effective') }}"
          purpose: Planungsprofil und EVOpt-Fallback
          fallback_profile: Netzdienlich laden
          active_control: "{{ states('sensor.se_nf_active_control_label') }}"
      - name: "Speichermanagement Version"
        unique_id: se_nf_package_version
        icon: mdi:package-variant
        state: "0.0.1"
        attributes:
          project: SolarEdge Energy Controller
          compatibility_namespace: se_nf
          architecture: modular_mode_arbiter_single_writers
          release: v0.0.1
          release_candidate: RC5-HF1
          grid_peak_strategy: configured_window_center
      - name: "SE NF Optimization Mode Effective"
        unique_id: se_nf_optimization_mode_effective
        icon: mdi:tune-variant
        state: >-
          {% set mode = states('input_select.se_nf_optimization_mode') %}
          {% if mode in ['Eigenverbrauch maximieren','Netzdienlich laden','Akku schonen','EVOpt optimiert'] %}
            {{ mode }}
          {% else %}
            Netzdienlich laden
          {% endif %}
        attributes:
          project: SolarEdge Energy Controller
          evopt_active_capable: true
          planning_profile_entity: sensor.se_nf_planning_profile_effective
      - name: "SE NF Charge Limit Entity Resolved"
        unique_id: se_nf_charge_limit_entity_resolved
        icon: mdi:lightning-bolt
        state: "{{ states('input_text.se_nf_charge_limit_entity') | trim }}"
        attributes:
          configured_entity: "{{ states('input_text.se_nf_charge_limit_entity') | trim }}"
          note: "v2.9.8: Writer-Ziel wird über input_text.se_nf_charge_limit_entity konfiguriert."
      - name: "SE NF Weather Entity Resolved"
        unique_id: se_nf_weather_entity_resolved
        icon: mdi:weather-partly-cloudy
        state: >-
          {% set cfg = states('input_text.se_nf_weather_entity') | trim %}
          {% if cfg and states(cfg) not in ['unknown','unavailable','none',''] %}
            {{ cfg }}
          {% else %}
            {% set ws = states.weather | list %}
            {% if ws | count > 0 %}
              {{ ws[0].entity_id }}
            {% else %}
              unknown
            {% endif %}
          {% endif %}
      - name: "SE NF Charge Limit Actual"
        unique_id: se_nf_charge_limit_actual
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:lightning-bolt
        state: >-
          {% set e = states('input_text.se_nf_charge_limit_entity') | trim %}
          {% if states(e) not in ['unknown','unavailable','none',''] %}
            {{ states(e) | float(0) | round(0) }}
          {% else %}
            unavailable
          {% endif %}
        attributes:
          source_entity: "{{ states('input_text.se_nf_charge_limit_entity') | trim }}"
          configured_entity: "{{ states('input_text.se_nf_charge_limit_entity') | trim }}"
      - name: "SE NF Battery Capacity kWh"
        unique_id: se_nf_battery_capacity_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:battery
        state: >-
          {% set e = states('input_text.se_nf_battery_capacity_entity') | trim %}
          {% set raw = states(e) if e else 'unknown' %}
          {% set fallback = states('input_number.se_nf_battery_capacity_kwh_fallback') | float(0) %}
          {% if raw not in ['unknown','unavailable','none',''] and (raw | float(0)) > 0 %}
            {% set v = raw | float(0) %}
            {% if v > 100 %}
              {{ (v / 1000) | round(2) }}
            {% else %}
              {{ v | round(2) }}
            {% endif %}
          {% elif fallback > 0 %}
            {{ fallback | round(2) }}
          {% else %}
            unavailable
          {% endif %}
