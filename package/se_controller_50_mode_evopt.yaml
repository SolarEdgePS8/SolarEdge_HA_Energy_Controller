# SolarEdge HA Energy Controller v0.1.0-rc.3 · Modus EVOpt optimiert
# EVOpt ist aktiv, wenn alle Health-/Schema-/Plan-/Stabilitäts-Gates erfüllt sind.
# Bei jeder Abweichung gilt vollständig der Modus Netzdienlich laden als Fallback.
# Diese Datei enthält keine SolarEdge-Schreibservices.

input_boolean:
  se_nf_evopt_shadow_enabled:
    name: EVOpt-Integration aktiviert
    icon: mdi:weather-night-partly-cloudy
    initial: false
input_text:
  se_nf_evopt_base_url:
    name: SE NF EVOpt Basis-URL
    icon: mdi:web
    initial: "http://example.invalid:7070"
    min: 1
    max: 255
  se_nf_evopt_battery_title:
    name: SE NF EVOpt Batterietitel
    icon: mdi:battery-search
    initial: "SolarEdge Akku"
    min: 1
    max: 100
  se_nf_evopt_battery_name:
    name: SE NF EVOpt Batteriename optional
    icon: mdi:identifier
    initial: ""
    min: 0
    max: 100
  se_nf_evopt_approved_schema_fingerprint:
    name: SE NF EVOpt freigegebener Schema-Fingerprint
    icon: mdi:fingerprint
    initial: "9e512ccd98ecf53647904f8b8384104796eb89c869fa0c6cfee1a25a40cc86bc"
    min: 64
    max: 128
input_number:
  se_nf_evopt_max_age_min:
    name: SE NF EVOpt maximales Datenalter
    icon: mdi:timer-sand
    min: 5
    max: 120
    step: 1
    unit_of_measurement: min
    mode: box
    initial: 25
command_line:
  - sensor:
      name: SE NF EVOpt Adapter Raw
      unique_id: se_nf_evopt_adapter_raw
      icon: mdi:code-json
      command: >-
        python3 /config/se_nf_evopt_shadow_adapter.py
        --evcc-url "{{ states('input_text.se_nf_evopt_base_url') }}"
        --battery-title "{{ states('input_text.se_nf_evopt_battery_title') }}"
        --battery-name "{{ states('input_text.se_nf_evopt_battery_name') }}"
        --max-age-min "{{ states('input_number.se_nf_evopt_max_age_min') }}"
      scan_interval: 60
      command_timeout: 25
      value_template: "{{ value_json.adapter_status | default('error') }}"
      json_attributes:
        - tool_version
        - created_at
        - evcc_url
        - evcc_reachable
        - response_ms
        - evcc_version
        - data_healthy
        - active_ready_raw
        - health_reason
        - solver_status
        - updated
        - age_min
        - fresh
        - fresh_by_update
        - current_slot_valid
        - slot_freshness_override
        - hard_stale_limit_min
        - schema_fingerprint
        - battery_index
        - battery_selection
        - device_selection
        - battery_title
        - battery_name
        - battery_controllable
        - battery_actionable
        - battery_soc_pct
        - battery_capacity_kwh
        - battery_plan_initial_soc_pct
        - battery_plan_min_soc_pct
        - battery_plan_max_soc_pct
        - action_raw
        - action_source
        - action_inference_reason
        - suggestion_action
        - suggestion_plan_consistent
        - suggestion_overridden
        - slot_action
        - slot_action_reason
        - suggested_charge
        - suggested_discharge
        - action_plan_consistent
        - plan_consistent
        - slot_count
        - horizon_hours
        - cadence_s
        - max_balance_error_wh
        - max_soc_recurrence_error_wh
        - max_timestamp_error_s
        - max_power_limit_error_wh
        - first_charge_time
        - first_discharge_time
        - first_grid_import_time
        - first_grid_export_time
        - plan_highest_soc_pct
        - plan_highest_soc_time
        - plan_lowest_soc_pct
        - plan_lowest_soc_time
        - forecast_highest_soc_pct
        - forecast_highest_time
        - forecast_lowest_soc_pct
        - forecast_lowest_time
        - live_pv_w
        - live_home_w
        - live_grid_w
        - live_battery_w
        - tariff_grid_eur_kwh
        - tariff_feedin_eur_kwh
        - slot_index
        - slot_start
        - slot_end
        - slot_duration_s
        - slot_pv_wh
        - slot_load_wh
        - slot_charge_wh
        - slot_discharge_wh
        - slot_grid_import_wh
        - slot_grid_export_wh
        - slot_pv_w
        - slot_load_w
        - slot_charge_w
        - slot_discharge_w
        - slot_grid_import_w
        - slot_grid_export_w
        - slot_soc_pct
        - slot_grid_price_eur_kwh
        - slot_feedin_price_eur_kwh
template:
  - binary_sensor:
      - name: SE NF EVOpt Reachable
        unique_id: se_nf_evopt_reachable
        icon: mdi:lan-connect
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'evcc_reachable') | default(false) }}
      - name: SE NF EVOpt Plan Consistent
        unique_id: se_nf_evopt_plan_consistent
        icon: mdi:table-check
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'plan_consistent') | default(false) }}
      - name: SE NF EVOpt Action Plan Consistent
        unique_id: se_nf_evopt_action_plan_consistent
        icon: mdi:transit-connection-variant
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'action_plan_consistent') | default(false) }}
      - name: SE NF EVOpt Raw Healthy
        unique_id: se_nf_evopt_raw_healthy
        icon: mdi:heart-pulse
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'data_healthy') | default(false) }}
      - name: SE NF EVOpt Healthy Stable
        unique_id: se_nf_evopt_healthy_stable
        icon: mdi:shield-check-outline
        state: >-
          {{ is_state('input_boolean.se_nf_evopt_shadow_enabled', 'on')
             and is_state('binary_sensor.se_nf_evopt_raw_healthy', 'on') }}
        delay_on:
          seconds: 120
      - name: SE NF EVOpt Schema Approved
        unique_id: se_nf_evopt_schema_approved
        icon: mdi:fingerprint
        state: >-
          {% set expected = states('input_text.se_nf_evopt_approved_schema_fingerprint') | trim %}
          {% set actual = state_attr('sensor.se_nf_evopt_adapter_raw', 'schema_fingerprint') | string | trim %}
          {{ expected | length == 64 and expected == actual }}
        attributes:
          expected: "{{ states('input_text.se_nf_evopt_approved_schema_fingerprint') }}"
          actual: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'schema_fingerprint') }}"
      - name: SE NF EVOpt Shadow Ready
        unique_id: se_nf_evopt_shadow_ready
        icon: mdi:check-decagram-outline
        state: >-
          {{ is_state('input_boolean.se_nf_evopt_shadow_enabled', 'on')
             and is_state('binary_sensor.se_nf_evopt_healthy_stable', 'on')
             and is_state('binary_sensor.se_nf_evopt_schema_approved', 'on')
             and is_state('binary_sensor.se_nf_evopt_action_plan_consistent', 'on') }}
      - name: SE NF EVOpt Holdcharge Stable
        unique_id: se_nf_evopt_holdcharge_stable
        icon: mdi:battery-lock
        state: >-
          {{ is_state('binary_sensor.se_nf_evopt_shadow_ready', 'on')
             and states('sensor.se_nf_evopt_action_raw') == 'holdcharge' }}
        delay_on:
          seconds: 60
      - name: SE NF EVOpt Normal Stable
        unique_id: se_nf_evopt_normal_stable
        icon: mdi:battery-sync
        state: >-
          {{ is_state('binary_sensor.se_nf_evopt_shadow_ready', 'on')
             and states('sensor.se_nf_evopt_action_raw') == 'normal' }}
        delay_on:
          seconds: 60
      - name: SE NF EVOpt Charge Stable
        unique_id: se_nf_evopt_charge_stable
        icon: mdi:battery-charging-high
        state: >-
          {{ is_state('binary_sensor.se_nf_evopt_shadow_ready', 'on')
             and states('sensor.se_nf_evopt_action_raw') == 'charge' }}
        delay_on:
          seconds: 60
      - name: SE NF EVOpt Charge Block Request
        unique_id: se_nf_evopt_charge_block_request
        icon: mdi:battery-lock
        state: >-
          {{ is_state('binary_sensor.se_nf_evopt_shadow_ready', 'on')
             and states('sensor.se_nf_evopt_action_raw') == 'holdcharge' }}
        delay_off:
          seconds: 60
      - name: SE NF EVOpt Differs From Legacy
        unique_id: se_nf_evopt_differs_from_legacy
        icon: mdi:compare-horizontal
        state: >-
          {% set legacy = states('sensor.se_nf_legacy_target_w') | float(5000) %}
          {% set candidate = states('sensor.se_nf_evopt_candidate_target_w') | float(legacy) %}
          {% set delta = states('input_number.se_nf_write_min_delta_w') | float(100) %}
          {{ (candidate - legacy) | abs >= delta }}
        attributes:
          legacy_target_w: "{{ states('sensor.se_nf_legacy_target_w') }}"
          evopt_candidate_target_w: "{{ states('sensor.se_nf_evopt_candidate_target_w') }}"
      - name: SE NF EVOpt Fallback Active
        unique_id: se_nf_evopt_fallback_active
        icon: mdi:backup-restore
        state: >-
          {{ states('sensor.se_nf_optimization_mode_effective') == 'EVOpt optimiert' and not is_state('binary_sensor.se_nf_evopt_active_control','on')
          }}
        attributes:
          fallback_profile: Netzdienlich laden
          code: "{{ states('sensor.se_nf_evopt_fallback_code') }}"
          reason: "{{ states('sensor.se_nf_evopt_shadow_reason') }}"
          started_at: >-
            {% if is_state('binary_sensor.se_nf_evopt_fallback_active', 'on') %}
              {{ as_local(states.binary_sensor.se_nf_evopt_fallback_active.last_changed).isoformat() }}
            {% else %}
              {{ none }}
            {% endif %}
          duration_s: >-
            {% if is_state('binary_sensor.se_nf_evopt_fallback_active', 'on') %}
              {{ (now().timestamp() - as_timestamp(states.binary_sensor.se_nf_evopt_fallback_active.last_changed, now().timestamp())) | int(0) }}
            {% else %}
              0
            {% endif %}
      - name: SE NF EVOpt Hold Stable
        unique_id: se_nf_evopt_hold_stable
        icon: mdi:battery-lock-open
        state: "{{ is_state('binary_sensor.se_nf_evopt_shadow_ready', 'on') and states('sensor.se_nf_evopt_action_raw') == 'hold' }}"
        delay_on:
          seconds: 60
      - name: SE NF EVOpt Charge Control Available
        unique_id: se_nf_evopt_charge_control_available
        icon: mdi:battery-arrow-up-outline
        state: "{{ states('sensor.se_nf_charge_limit_actual') not in ['unknown','unavailable','none',''] }}"
      - name: SE NF EVOpt Discharge Control Available
        unique_id: se_nf_evopt_discharge_control_available
        icon: mdi:battery-arrow-down-outline
        state: >-
          {% set e = states('input_text.se_nf_discharge_limit_entity') | trim %}
          {{ e not in ['', 'unknown', 'unavailable', 'none', 'None']
             and states(e) not in ['unknown','unavailable','none','None','']
             and is_state('input_boolean.se_netzdienlich_enabled','on') }}
      - name: SE NF EVOpt Grid Charge Control Available
        unique_id: se_nf_evopt_grid_charge_control_available
        icon: mdi:transmission-tower-import
        state: >-
          {% set cmd = states('input_text.se_nf_command_mode_entity') | trim %}
          {% set ctl = states('input_text.se_nf_storage_control_mode_entity') | trim %}
          {% set remote_opt = states('input_text.se_nf_storage_control_remote_option') | trim %}
          {% set options = state_attr(cmd,'options') if cmd not in ['', 'unknown', 'unavailable', 'none', 'None'] else [] %}
          {% set remote_ok = true if ctl in ['', 'unknown', 'unavailable', 'none', 'None'] else
             (states(ctl) == remote_opt if remote_opt not in ['', 'unknown', 'unavailable', 'none', 'None'] else states(ctl) | lower in ['remote control','remote','extern','external']) %}
          {{ is_state('input_boolean.se_netzdienlich_enabled','on')
             and remote_ok
             and cmd not in ['', 'unknown', 'unavailable', 'none', 'None']
             and states(cmd) not in ['unknown','unavailable','none','None','']
             and options is sequence
             and (options | select('search','(?i)charge from solar power and grid') | list | length) > 0 }}
      - name: SE NF EVOpt Active Control
        unique_id: se_nf_evopt_active_control
        icon: mdi:toggle-switch
        state: >-
          {% set selected = states('sensor.se_nf_optimization_mode_effective') %}
          {% set action = states('sensor.se_nf_evopt_action_raw') %}
          {% set base = selected == 'EVOpt optimiert'
             and is_state('binary_sensor.se_nf_evopt_shadow_ready','on')
             and is_state('input_boolean.se_netzdienlich_enabled','on')
             and is_state('sensor.se_nf_config_check','ok')
             and is_state('sensor.se_nf_sanity_check','ok')
             and states('input_select.se_nf_session_state') not in ['evcc_override','low_soc','risk'] %}
          {% set charge_ok = is_state('binary_sensor.se_nf_evopt_charge_control_available','on') %}
          {% set discharge_ok = is_state('binary_sensor.se_nf_evopt_discharge_control_available','on') %}
          {% set grid_ok = is_state('binary_sensor.se_nf_evopt_grid_charge_control_available','on') %}
          {{ base and (
             (action in ['holdcharge','normal'] and charge_ok)
             or (action == 'hold' and charge_ok and discharge_ok)
             or (action == 'charge' and charge_ok and discharge_ok and grid_ok)
          ) }}
        attributes:
          action_raw: "{{ states('sensor.se_nf_evopt_action_raw') }}"
          action_stable: "{{ states('sensor.se_nf_evopt_action_stable') }}"
          transition_policy: restrictive_immediate_permissive_delayed
      - name: SE NF EVOpt Discharge Lock Request
        unique_id: se_nf_evopt_discharge_lock_request
        icon: mdi:battery-lock
        state: >-
          {{ is_state('binary_sensor.se_nf_evopt_active_control','on')
             and states('sensor.se_nf_evopt_action_raw') in ['hold','charge'] }}
        delay_off:
          seconds: 60
      - name: SE NF EVOpt Grid Charge Request
        unique_id: se_nf_evopt_grid_charge_request
        icon: mdi:transmission-tower-import
        state: >-
          {{ is_state('binary_sensor.se_nf_evopt_active_control','on')
             and states('sensor.se_nf_evopt_action_raw') == 'charge' }}
        delay_on:
          seconds: 60
  - sensor:
      - name: SE NF EVOpt Status
        unique_id: se_nf_evopt_status
        icon: mdi:list-status
        state: >-
          {% if not is_state('input_boolean.se_nf_evopt_shadow_enabled', 'on') %}
            disabled
          {% elif not is_state('binary_sensor.se_nf_evopt_reachable', 'on') %}
            unavailable
          {% elif not is_state('binary_sensor.se_nf_evopt_raw_healthy', 'on') %}
            invalid
          {% elif not is_state('binary_sensor.se_nf_evopt_schema_approved', 'on') %}
            schema_blocked
          {% elif not is_state('binary_sensor.se_nf_evopt_healthy_stable', 'on') %}
            warming_up
          {% elif not is_state('binary_sensor.se_nf_evopt_action_plan_consistent', 'on') %}
            action_mismatch
          {% elif not is_state('binary_sensor.se_nf_evopt_shadow_ready', 'on') %}
            waiting
          {% else %}
            healthy
          {% endif %}
        attributes:
          reason: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'health_reason') }}"
          updated: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'updated') }}"
          age_min: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'age_min') }}"
          solver_status: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'solver_status') }}"
          response_ms: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'response_ms') }}"
          fresh_by_update: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'fresh_by_update') }}"
          current_slot_valid: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'current_slot_valid') }}"
          current_slot_index: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_index') }}"
          slot_freshness_override: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_freshness_override') }}"
          hard_stale_limit_min: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'hard_stale_limit_min') }}"
          action_source: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'action_source') }}"
          suggestion_action: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'suggestion_action') }}"
          suggestion_plan_consistent: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'suggestion_plan_consistent') }}"
          suggestion_overridden: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'suggestion_overridden') }}"
          slot_action: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_action') }}"
          slot_action_reason: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_action_reason') }}"
      - name: SE NF EVOpt Action Raw
        unique_id: se_nf_evopt_action_raw
        icon: mdi:battery-cog-outline
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'action_raw') | default('unavailable', true) }}
        attributes:
          actionable: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'battery_actionable') }}"
          action_source: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'action_source') }}"
          inference_reason: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'action_inference_reason') }}"
          suggestion_action: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'suggestion_action') }}"
          suggestion_plan_consistent: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'suggestion_plan_consistent') }}"
          suggestion_overridden: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'suggestion_overridden') }}"
          slot_action: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_action') }}"
          slot_action_reason: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_action_reason') }}"
          suggested_charge: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'suggested_charge') }}"
          suggested_discharge: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'suggested_discharge') }}"
      - name: SE NF EVOpt Action Stable
        unique_id: se_nf_evopt_action_stable
        icon: mdi:battery-sync-outline
        state: >-
          {% if is_state('binary_sensor.se_nf_evopt_holdcharge_stable', 'on') %}
            holdcharge
          {% elif is_state('binary_sensor.se_nf_evopt_normal_stable', 'on') %}
            normal
          {% elif is_state('binary_sensor.se_nf_evopt_hold_stable', 'on') %}
            hold
          {% elif is_state('binary_sensor.se_nf_evopt_charge_stable', 'on') %}
            charge
          {% elif is_state('binary_sensor.se_nf_evopt_shadow_ready', 'on') %}
            stabilizing
          {% else %}
            unavailable
          {% endif %}
      - name: SE NF EVOpt Updated
        unique_id: se_nf_evopt_updated
        device_class: timestamp
        icon: mdi:update
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'updated') not in [none, '', 'unknown', 'unavailable'] }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'updated') }}
      - name: SE NF EVOpt Age Min
        unique_id: se_nf_evopt_age_min
        unit_of_measurement: min
        state_class: measurement
        icon: mdi:timer-sand
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'age_min') is number }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'age_min') | float(0) | round(2) }}
      - name: SE NF EVOpt Solver Status
        unique_id: se_nf_evopt_solver_status
        icon: mdi:function-variant
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'solver_status') | default('unknown', true) }}
      - name: SE NF EVOpt Schema Fingerprint
        unique_id: se_nf_evopt_schema_fingerprint
        icon: mdi:fingerprint
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'schema_fingerprint') | default('unknown', true) }}
      - name: SE NF EVOpt Battery SoC
        unique_id: se_nf_evopt_battery_soc
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        icon: mdi:battery
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'battery_soc_pct') is number }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'battery_soc_pct') | float(0) | round(2) }}
      - name: SE NF EVOpt Battery Capacity kWh
        unique_id: se_nf_evopt_battery_capacity_kwh
        unit_of_measurement: kWh
        state_class: measurement
        icon: mdi:battery-high
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'battery_capacity_kwh') is number }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'battery_capacity_kwh') | float(0) | round(3) }}
      - name: SE NF EVOpt Current Slot Start
        unique_id: se_nf_evopt_current_slot_start
        device_class: timestamp
        icon: mdi:clock-start
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_start') not in [none, '', 'unknown', 'unavailable'] }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_start') }}
      - name: SE NF EVOpt Current Slot End
        unique_id: se_nf_evopt_current_slot_end
        device_class: timestamp
        icon: mdi:clock-end
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_end') not in [none, '', 'unknown', 'unavailable'] }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_end') }}
      - name: SE NF EVOpt Current Slot Charge W
        unique_id: se_nf_evopt_current_slot_charge_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_charge_w') is number }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_charge_w') | float(0) | round(0) }}
      - name: SE NF EVOpt Current Slot Discharge W
        unique_id: se_nf_evopt_current_slot_discharge_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:battery-arrow-down
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_discharge_w') is number }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_discharge_w') | float(0) | round(0) }}
      - name: SE NF EVOpt Current Slot Import W
        unique_id: se_nf_evopt_current_slot_import_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower-import
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_grid_import_w') is number }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_grid_import_w') | float(0) | round(0) }}
      - name: SE NF EVOpt Current Slot Export W
        unique_id: se_nf_evopt_current_slot_export_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower-export
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_grid_export_w') is number }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_grid_export_w') | float(0) | round(0) }}
      - name: SE NF EVOpt Plan Highest SoC Pct
        unique_id: se_nf_evopt_plan_highest_soc_pct
        unit_of_measurement: "%"
        icon: mdi:battery-arrow-up-outline
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'plan_highest_soc_pct') is number }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'plan_highest_soc_pct') | float(0) | round(2) }}
        attributes:
          time: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'plan_highest_soc_time') }}"
      - name: SE NF EVOpt Plan Lowest SoC Pct
        unique_id: se_nf_evopt_plan_lowest_soc_pct
        unit_of_measurement: "%"
        icon: mdi:battery-arrow-down-outline
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'plan_lowest_soc_pct') is number }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'plan_lowest_soc_pct') | float(0) | round(2) }}
        attributes:
          time: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'plan_lowest_soc_time') }}"
      - name: SE NF EVOpt Plan Balance Error Wh
        unique_id: se_nf_evopt_plan_balance_error_wh
        unit_of_measurement: Wh
        icon: mdi:scale-balance
        availability: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'max_balance_error_wh') is number }}
        state: >-
          {{ state_attr('sensor.se_nf_evopt_adapter_raw', 'max_balance_error_wh') | float(0) | round(4) }}
      - name: SE NF Legacy Target W
        unique_id: se_nf_legacy_target_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:source-branch
        state: >-
          {{ states('sensor.se_controller_netzdienlich_charge_target') | float(5000) | round(0) }}
        attributes:
          source_entity: sensor.se_controller_netzdienlich_charge_target
          phase: active_fallback
          fallback_profile: Netzdienlich laden
      - name: SE NF EVOpt Candidate Source
        unique_id: se_nf_evopt_candidate_source
        icon: mdi:source-branch-check
        state: >-
          {% set selected = states('sensor.se_nf_optimization_mode_effective') %}

          {% set session = states('input_select.se_nf_session_state') %}

          {% if not is_state('input_boolean.se_netzdienlich_enabled', 'on') or not is_state('sensor.se_nf_config_check','ok') or not is_state('sensor.se_nf_sanity_check','ok')
          or session in ['evcc_override','low_soc','risk'] %}
            safety
          {% elif selected == 'Eigenverbrauch maximieren' %}
            policy
          {% elif selected != 'EVOpt optimiert' %}
            legacy
          {% elif is_state('binary_sensor.se_nf_evopt_active_control','on') %}
            evopt
          {% else %}
            legacy
          {% endif %}
        attributes:
          selected_mode: "{{ states('sensor.se_nf_optimization_mode_effective') }}"
          fallback_profile: Netzdienlich laden
          read_only: false
      - name: SE NF EVOpt Candidate Target W
        unique_id: se_nf_evopt_candidate_target_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:target-variant
        state: >-
          {% set fallback = states('sensor.se_nf_legacy_target_w') | float(5000) %}

          {% set open_w = states('input_number.se_nf_open_charge_limit_w') | float(5000) %}

          {% set closed_w = states('input_number.se_nf_closed_charge_limit_w') | float(0) %}

          {% set source = states('sensor.se_nf_evopt_candidate_source') %}

          {% set charge_block = is_state('binary_sensor.se_nf_evopt_charge_block_request', 'on') %}

          {% if source == 'evopt' and charge_block %}
            {{ closed_w | round(0) }}
          {% elif source == 'evopt' %}
            {{ open_w | round(0) }}
          {% else %}
            {{ fallback | round(0) }}
          {% endif %}
        attributes:
          action_raw: "{{ states('sensor.se_nf_evopt_action_raw') }}"
          action_stable: "{{ states('sensor.se_nf_evopt_action_stable') }}"
          charge_block_request: "{{ states('binary_sensor.se_nf_evopt_charge_block_request') }}"
          source: "{{ states('sensor.se_nf_evopt_candidate_source') }}"
          charge_control: binary_0_or_5000
          transition_policy: restrictive_immediate_permissive_delayed
          fallback: Netzdienlich laden
      - name: SE NF EVOpt Shadow Effective Target W
        unique_id: se_nf_evopt_shadow_effective_target_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:shield-lock-outline
        state: >-
          {{ states('sensor.se_nf_desired_target') | float(5000) | round(0) }}
        attributes:
          control_source: "{{ states('sensor.se_nf_active_control_label') }}"
          writer_unchanged: false
          evopt_candidate_target_w: "{{ states('sensor.se_nf_evopt_candidate_target_w') }}"
          compatibility_name: true
      - name: SE NF EVOpt Target Delta W
        unique_id: se_nf_evopt_target_delta_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:delta
        state: >-
          {% set legacy = states('sensor.se_nf_legacy_target_w') | float(5000) %}
          {% set candidate = states('sensor.se_nf_evopt_candidate_target_w') | float(legacy) %}
          {{ (candidate - legacy) | round(0) }}
      - name: SE NF EVOpt Fallback Code
        unique_id: se_nf_evopt_fallback_code
        icon: mdi:alert-decagram-outline
        state: >-
          {% set selected = states('sensor.se_nf_optimization_mode_effective') %}
          {% set source = states('sensor.se_nf_evopt_candidate_source') %}
          {% set status = states('sensor.se_nf_evopt_status') %}
          {% set action = states('sensor.se_nf_evopt_action_raw') %}
          {% if selected != 'EVOpt optimiert' %}
            inactive
          {% elif source == 'safety' %}
            safety_override
          {% elif source == 'evopt' %}
            none
          {% elif status in ['disabled','unavailable','invalid','schema_blocked','warming_up','action_mismatch','waiting'] %}
            {{ status }}
          {% elif not is_state('binary_sensor.se_nf_evopt_charge_control_available','on') %}
            charge_control_missing
          {% elif action in ['hold','charge'] and not is_state('binary_sensor.se_nf_evopt_discharge_control_available','on') %}
            discharge_control_missing
          {% elif action == 'charge' and not is_state('binary_sensor.se_nf_evopt_grid_charge_control_available','on') %}
            grid_charge_control_missing
          {% elif action not in ['holdcharge','normal','hold','charge'] %}
            action_unavailable
          {% else %}
            active_control_blocked
          {% endif %}
        attributes:
          status: "{{ states('sensor.se_nf_evopt_status') }}"
          health_reason: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'health_reason') }}"
          action_raw: "{{ states('sensor.se_nf_evopt_action_raw') }}"
          action_source: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'action_source') }}"
          suggestion_action: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'suggestion_action') }}"
          slot_action: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'slot_action') }}"
          suggestion_overridden: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'suggestion_overridden') }}"
          charge_control: "{{ states('binary_sensor.se_nf_evopt_charge_control_available') }}"
          discharge_control: "{{ states('binary_sensor.se_nf_evopt_discharge_control_available') }}"
          grid_charge_control: "{{ states('binary_sensor.se_nf_evopt_grid_charge_control_available') }}"
      - name: SE NF EVOpt Shadow Reason
        unique_id: se_nf_evopt_shadow_reason
        icon: mdi:text-box-search-outline
        state: >-
          {% set selected = states('sensor.se_nf_optimization_mode_effective') %}
          {% set source = states('sensor.se_nf_evopt_candidate_source') %}
          {% set action = states('sensor.se_nf_evopt_action_raw') %}
          {% set charge_block = is_state('binary_sensor.se_nf_evopt_charge_block_request', 'on') %}
          {% if source == 'safety' %}
            Sicherheitsregel aktiv
          {% elif selected != 'EVOpt optimiert' %}
            EVOpt-Modus nicht gewählt
          {% elif source == 'evopt' and action == 'holdcharge' %}
            EVOpt aktiv · Laden gesperrt
          {% elif source == 'evopt' and action == 'normal' and charge_block %}
            EVOpt aktiv · Übergang zu normal, Ladefreigabe verzögert
          {% elif source == 'evopt' and action == 'normal' %}
            EVOpt aktiv · normaler Speicherbetrieb
          {% elif source == 'evopt' and action == 'hold' %}
            EVOpt aktiv · Entladung gesperrt
          {% elif source == 'evopt' and action == 'charge' and not is_state('binary_sensor.se_nf_evopt_grid_charge_request','on') %}
            EVOpt aktiv · Netzladung wird stabilisiert
          {% elif source == 'evopt' and action == 'charge' %}
            EVOpt aktiv · Netzladung angefordert
          {% else %}
            EVOpt-Fallback {{ states('sensor.se_nf_evopt_fallback_code') }} · Netzdienlich aktiv
          {% endif %}
        attributes:
          fallback_code: "{{ states('sensor.se_nf_evopt_fallback_code') }}"
          action_raw: "{{ states('sensor.se_nf_evopt_action_raw') }}"
          action_stable: "{{ states('sensor.se_nf_evopt_action_stable') }}"
          action_source: "{{ state_attr('sensor.se_nf_evopt_adapter_raw', 'action_source') }}"
      - name: SE NF EVOpt Mode Status
        unique_id: se_nf_evopt_mode_status
        icon: mdi:state-machine
        state: >-
          {% set selected = states('sensor.se_nf_optimization_mode_effective') %}

          {% set source = states('sensor.se_nf_evopt_candidate_source') %}

          {% if selected != 'EVOpt optimiert' %}
            inactive
          {% elif source == 'safety' %}
            safety_override
          {% elif source == 'evopt' %}
            active
          {% else %}
            fallback_active
          {% endif %}
        attributes:
          user_label: "{% set s = states('sensor.se_nf_evopt_mode_status') %}{% if s == 'active' %}EVOpt steuert aktiv{% elif s == 'fallback_active'
            %}Netzdienlicher Fallback aktiv{% elif s == 'safety_override' %}Sicherheitssteuerung aktiv{% else %}EVOpt-Modus nicht gewählt{% endif
            %}"
      - name: SE NF Active Control Label
        unique_id: se_nf_active_control_label
        icon: mdi:shield-check-outline
        state: >-
          {% set selected = states('sensor.se_nf_optimization_mode_effective') %}

          {% set session = states('input_select.se_nf_session_state') %}

          {% if session in ['evcc_override','low_soc','risk'] or not is_state('sensor.se_nf_config_check','ok') or not is_state('sensor.se_nf_sanity_check','ok')
          %}
            Sicherheitssteuerung
          {% elif selected == 'EVOpt optimiert' and is_state('binary_sensor.se_nf_evopt_active_control','on') %}
            EVOpt
          {% elif selected == 'EVOpt optimiert' %}
            Netzdienlicher Fallback
          {% elif selected == 'Eigenverbrauch maximieren' %}
            Eigenverbrauch
          {% elif selected == 'Akku schonen' %}
            Akku schonen
          {% else %}
            Netzdienliche Planung
          {% endif %}
      - name: SE NF EVOpt Shadow Summary
        unique_id: se_nf_evopt_shadow_summary
        icon: mdi:chart-timeline-variant-shimmer
        state: >-
          {{ states('sensor.se_nf_evopt_status') }} · Empfehlung {{ states('sensor.se_nf_evopt_action_stable') }} · Quelle {{ states('sensor.se_nf_active_control_label')
          }} · Ziel {{ states('sensor.se_nf_desired_target') }} W
        attributes:
          mode: "{{ states('sensor.se_nf_optimization_mode_effective') }}"
          active_control: "{{ states('sensor.se_nf_active_control_label') }}"
          session: "{{ states('input_select.se_nf_session_state') }}"
          fallback_active: "{{ is_state('binary_sensor.se_nf_evopt_fallback_active','on') }}"
          discharge_lock_request: "{{ is_state('binary_sensor.se_nf_evopt_discharge_lock_request','on') }}"
          grid_charge_request: "{{ is_state('binary_sensor.se_nf_evopt_grid_charge_request','on') }}"
      - name: SE Controller EVOpt Charge Target
        unique_id: se_controller_evopt_charge_target_w
        icon: mdi:battery-sync
        state: "{{ states('sensor.se_nf_evopt_candidate_target_w') | float(states('sensor.se_nf_legacy_target_w') | float(5000)) | round(0) }}"
        unit_of_measurement: W
        device_class: power
        state_class: measurement
